  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

const TYPES = ["Bill", "Payment"];
const CURRENCIES = [
  { code:"USD", symbol:"$",  label:"US Dollar" },
  { code:"CNY", symbol:"¥",  label:"Chinese RMB" },
  { code:"BDT", symbol:"৳",  label:"Bangladeshi Taka" },
  { code:"EUR", symbol:"€",  label:"Euro" },
];
const getCurrency = (code) => CURRENCIES.find(c => c.code === code) || CURRENCIES[0];
const DEFAULT_PEOPLE = [];
const DEFAULT_ENTRY_BY = [];

let nextId = 5;
let nextTxnNum = 5;
const makeTxnId = (n) => "TXN-" + String(n).padStart(4, "0");
const fmtDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString("en-GB", { day:"2-digit", month:"short", year:"numeric" });
};

const initialData = [
  { id: 1, txnId: "TXN-0001", name: "LYNN",   type: "Bill",    amount: 1200, source: "Office",  entryBy: "AZIM",  createdAt: "2025-01-10T09:15:00", docs: [] },
  { id: 2, txnId: "TXN-0002", name: "GARRY",  type: "Payment", amount: 3500, source: "Bank",    entryBy: "ZIDAN", createdAt: "2025-01-12T11:30:00", docs: [] },
  { id: 3, txnId: "TXN-0003", name: "HELLEN", type: "Bill",    amount: 85,   source: "Utility", entryBy: "EMON",  createdAt: "2025-01-14T14:00:00", docs: [] },
  { id: 4, txnId: "TXN-0004", name: "LYNN",   type: "Payment", amount: 600,  source: "Cash",    entryBy: "PARVEZ",createdAt: "2025-01-15T16:45:00", docs: [] },
];

const fmt = (v) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(v);
const fmtC = (v, code="USD") => {
  try { return new Intl.NumberFormat("en-US", { style:"currency", currency: code }).format(v); }
  catch { const cur = getCurrency(code); return cur.symbol + Number(v).toFixed(2); }
};
const AVATAR_COLORS = ["#5b5bf6","#f59e0b","#10b981","#f97316","#8b5cf6","#06b6d4","#f43f5e"];
const EB_COLORS    = ["#a78bfa","#fb923c","#34d399","#f472b6","#60a5fa","#facc15","#e879f9"];

// ── PDF GENERATOR ─────────────────────────────────────────────────────────────
function generatePDF(person, entries, people) {
  const pe    = entries.filter(e => e.name === person);
  const today = new Date().toLocaleDateString("en-GB", { year:"numeric", month:"long", day:"numeric" });


  // Group by currency
  const cMap = {};
  pe.forEach(e => {
    const c = e.currency || "USD";
    if (!cMap[c]) cMap[c] = { bills:0, payments:0 };
    if (e.type === "Bill") cMap[c].bills += e.amount;
    else cMap[c].payments += e.amount;
  });
  const currencies = Object.keys(cMap);

  // Summary cards — clean black/grey
  const summaryCards = `
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
    <div style="border:1.5px solid #000;border-radius:6px;padding:12px 14px">
      <div style="font-size:9px;font-weight:700;color:#555;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid #ddd;padding-bottom:5px">TOTAL BILLS</div>
      ${currencies.map(code => `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
        <span style="font-size:9px;font-weight:700;color:#000;background:#f0f0f0;border:1px solid #ccc;padding:1px 5px;border-radius:2px">${code}</span>
        <span style="font-size:13px;font-weight:800;color:#000">${fmtC(cMap[code].bills,code)}</span>
      </div>`).join("")}
    </div>
    <div style="border:1.5px solid #000;border-radius:6px;padding:12px 14px">
      <div style="font-size:9px;font-weight:700;color:#555;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid #ddd;padding-bottom:5px">TOTAL PAYMENTS</div>
      ${currencies.map(code => `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
        <span style="font-size:9px;font-weight:700;color:#000;background:#f0f0f0;border:1px solid #ccc;padding:1px 5px;border-radius:2px">${code}</span>
        <span style="font-size:13px;font-weight:800;color:#000">${fmtC(cMap[code].payments,code)}</span>
      </div>`).join("")}
    </div>
    <div style="border:2px solid #000;border-radius:6px;padding:12px 14px;background:#f8f8f8">
      <div style="font-size:9px;font-weight:700;color:#555;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid #bbb;padding-bottom:5px">NET BALANCE</div>
      ${currencies.map(code => { const bal=cMap[code].payments-cMap[code].bills; return `<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">
        <span style="font-size:9px;font-weight:700;color:#000;background:#f0f0f0;border:1px solid #ccc;padding:1px 5px;border-radius:2px">${code}</span>
        <span style="font-size:13px;font-weight:800;color:#000">${bal >= 0 ? "" : "– "}${fmtC(Math.abs(bal),code)}<span style="font-size:9px;font-weight:600;color:#444;margin-left:4px">${bal >= 0 ? "CR" : "DR"}</span></span>
      </div>`; }).join("")}
    </div>
  </div>`;

  // Transaction rows — laser print optimized
  const runningMap = {};
  const rows = pe.map((e, i) => {
    const code = e.currency || "USD";
    if (!runningMap[code]) runningMap[code] = 0;
    runningMap[code] += e.type === "Payment" ? e.amount : -e.amount;
    const running = runningMap[code];
    const bg = i % 2 === 0 ? "#ffffff" : "#f7f7f7";
    return `<tr style="background:${bg}">
      <td style="padding:7px 10px;border-bottom:1px solid #e0e0e0;font-size:10px;font-family:monospace;font-weight:700;color:#000">${e.txnId || "#"+(i+1)}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e0e0e0;font-size:10px;color:#333">${e.createdAt ? new Date(e.createdAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—"}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e0e0e0;text-align:center">
        <span style="font-size:9px;font-weight:800;letter-spacing:.04em;color:#000;border:1.5px solid #000;padding:2px 7px;border-radius:3px;${e.type==="Bill" ? "border-style:solid" : "border-style:dashed"}">${e.type.toUpperCase()}</span>
      </td>
      <td style="padding:7px 10px;border-bottom:1px solid #e0e0e0;font-size:11px;color:#222">${e.source || "—"}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e0e0e0;font-size:10px;color:#444">${e.entryBy || "—"}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e0e0e0;font-size:9px;font-weight:700;text-align:center;color:#000">
        <span style="background:#eee;border:1px solid #bbb;padding:1px 5px;border-radius:2px">${code}</span>
      </td>
      <td style="padding:7px 10px;border-bottom:1px solid #e0e0e0;font-size:12px;font-weight:700;color:#000;text-align:right;font-family:monospace">${e.type==="Bill" ? "(" : ""}${fmtC(e.amount,code)}${e.type==="Bill" ? ")" : ""}</td>
      <td style="padding:7px 10px;border-bottom:1px solid #e0e0e0;font-size:12px;font-weight:800;color:#000;text-align:right;font-family:monospace">${running < 0 ? "(" : ""}${fmtC(Math.abs(running),code)}${running < 0 ? ")" : ""}<span style="font-size:8px;font-weight:600;color:#555;margin-left:2px">${running >= 0 ? "CR" : "DR"}</span></td>
    </tr>`;
  }).join("");

  // Footer totals
  const footerRows = currencies.map(code => {
    const v = cMap[code];
    const bal = v.payments - v.bills;
    return `<tr style="background:#f0f0f0">
      <td colspan="5" style="padding:8px 10px;font-size:10px;font-weight:800;color:#000;border-top:2px solid #000;letter-spacing:.04em">
        <span style="background:#ddd;border:1px solid #999;color:#000;padding:2px 7px;border-radius:2px;font-size:9px">${code}</span> &nbsp;TOTAL
      </td>
      <td style="border-top:2px solid #000"></td>
      <td style="padding:8px 10px;text-align:right;font-size:12px;font-weight:800;color:#000;border-top:2px solid #000;font-family:monospace">(${fmtC(v.bills,code)})</td>
      <td style="padding:8px 10px;text-align:right;font-size:12px;font-weight:800;color:#000;border-top:2px solid #000;font-family:monospace">${fmtC(Math.abs(bal),code)}<span style="font-size:8px;font-weight:600;color:#555;margin-left:2px">${bal>=0?"CR":"DR"}</span></td>
    </tr>`;
  }).join("");

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Statement — ${person}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"><\/script>
<script>
function downloadPDF() {
  var btn = document.getElementById('dl-btn');
  var noPrint = document.querySelectorAll('.no-print');
  noPrint.forEach(function(el){ el.style.display='none'; });
  btn && (btn.disabled = true);
  var element = document.getElementById('pdf-content');
  var opt = {
    margin: [12.7, 12.7, 12.7, 12.7],
    filename: document.title.replace('Statement — ','Paragon-') + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, letterRendering: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };
  html2pdf().set(opt).from(element).save().then(function(){
    noPrint.forEach(function(el){ el.style.display=''; });
    if(btn) btn.disabled = false;
  });
}
<\/script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#fff;color:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact}
@page{margin:12.7mm 12.7mm 12.7mm 12.7mm;size:A4 portrait}
@media print{.no-print{display:none!important} body{font-size:11px}}
table{border-collapse:collapse;width:100%}
</style></head><body>
<div id="pdf-content" style="max-width:820px;margin:0 auto;padding:24px 0">
  <div class="no-print" style="display:flex;justify-content:flex-end;gap:10px;margin-bottom:20px">
    <button onclick="window.print()" style="background:#fff;color:#000;border:2px solid #000;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em">🖨️ Print</button>
    <button onclick="downloadPDF()" id="dl-btn" style="background:#000;color:#fff;border:2px solid #000;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.02em">⬇ Download PDF</button>
  </div>

  <!-- Header -->
  <div style="border:2px solid #000;border-radius:8px;padding:20px 24px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#555;margin-bottom:6px">Account Statement</div>
      <div style="font-size:26px;font-weight:800;color:#000;letter-spacing:-.02em;margin-bottom:2px">${person}</div>
      <div style="font-size:11px;color:#444">Generated: ${today}</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:18px;font-weight:800;color:#000;letter-spacing:-.01em">PARAGON</div>
      <div style="font-size:9px;color:#666;letter-spacing:.06em;text-transform:uppercase">Account Management System</div>
      <div style="margin-top:8px;font-size:10px;color:#444">${pe.length} transaction${pe.length!==1?"s":""}</div>
    </div>
  </div>

  <!-- Summary -->
  ${summaryCards}

  <!-- Transactions -->
  <div style="border:1.5px solid #000;border-radius:6px;overflow:hidden;margin-bottom:20px">
    <div style="background:#000;padding:9px 12px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:11px;font-weight:700;color:#fff;letter-spacing:.05em;text-transform:uppercase">Transaction History</span>
      <span style="font-size:10px;color:#ccc">${pe.length} records</span>
    </div>
    <table>
      <thead>
        <tr style="background:#e8e8e8">
          <th style="padding:8px 10px;text-align:left;font-size:9px;color:#000;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-bottom:1.5px solid #000">SUB. ID</th>
          <th style="padding:8px 10px;text-align:left;font-size:9px;color:#000;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-bottom:1.5px solid #000">Bill/Payment Date</th>
          <th style="padding:8px 10px;text-align:center;font-size:9px;color:#000;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-bottom:1.5px solid #000">Type</th>
          <th style="padding:8px 10px;text-align:left;font-size:9px;color:#000;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-bottom:1.5px solid #000">Details</th>
          <th style="padding:8px 10px;text-align:left;font-size:9px;color:#000;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-bottom:1.5px solid #000">Prepared By</th>
          <th style="padding:8px 10px;text-align:center;font-size:9px;color:#000;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-bottom:1.5px solid #000">CCY</th>
          <th style="padding:8px 10px;text-align:right;font-size:9px;color:#000;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-bottom:1.5px solid #000">Amount</th>
          <th style="padding:8px 10px;text-align:right;font-size:9px;color:#000;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-bottom:1.5px solid #000">Balance</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
      <tfoot>${footerRows}</tfoot>
    </table>
  </div>

  <!-- Footer -->
  <div style="display:flex;justify-content:space-between;padding-top:10px;border-top:1.5px solid #000">
    <span style="font-size:10px;color:#555">Paragon — Account Management System</span>
    <span style="font-size:10px;color:#555">Printed: ${today}</span>
  </div>
</div>
</body></html>`;

  const blob = new Blob([html], { type:"text/html" });
  const url  = URL.createObjectURL(blob);
  const win  = window.open(url, "_blank");
  if (!win) {
    const a = document.createElement("a");
    a.href = url; a.download = `Paragon-${person}-Statement.html`; a.click();
  }
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}


// ── FILE ICON ─────────────────────────────────────────────────────────────────
function FileIcon({ type }) {
  const isPdf = type === "application/pdf";
  return (
    <div style={{ width:32,height:32,borderRadius:6,background:isPdf?"#2d1a1a":"#1a1a2d",border:`1px solid ${isPdf?"#5c2020":"#2a2a5c"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
      {isPdf
        ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fb923c" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
      }
    </div>
  );
}

// ── DOC UPLOADER ──────────────────────────────────────────────────────────────
function DocUploader({ docs, onChange }) {
  const inputRef = useRef();
  const [dragging, setDragging] = useState(false);
  const [previewDoc, setPreviewDoc] = useState(null);
  const handleFiles = (fileList) => {
    Array.from(fileList).filter(f => f.type === "application/pdf" || f.type.startsWith("image/")).forEach(f => {
      const reader = new FileReader();
      reader.onload = ev => onChange(prev => [...prev, { id: Date.now()+Math.random(), name:f.name, type:f.type, size:f.size, dataUrl:ev.target.result }]);
      reader.readAsDataURL(f);
    });
  };
  const sz = b => b < 1048576 ? `${(b/1024).toFixed(0)} KB` : `${(b/1048576).toFixed(1)} MB`;
  return (
    <div>
      <div onDragOver={e=>{e.preventDefault();setDragging(true)}} onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);handleFiles(e.dataTransfer.files)}}
        onClick={()=>inputRef.current.click()}
        style={{border:`2px dashed ${dragging?"#5b5bf6":"#2e2e3a"}`,borderRadius:10,padding:"18px",textAlign:"center",cursor:"pointer",background:dragging?"#16162e":"#1a1a22",transition:"all .2s"}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={dragging?"#5b5bf6":"#444"} strokeWidth="1.5" style={{margin:"0 auto 7px",display:"block"}}>
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p style={{fontSize:12,color:dragging?"#a5b4fc":"#666",marginBottom:2}}>{dragging?"Drop here":"Click or drag to upload"}</p>
        <p style={{fontSize:10,color:"#444"}}>PDF, JPG, PNG, WEBP</p>
        <input ref={inputRef} type="file" multiple accept="application/pdf,image/*" style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
      </div>
      {docs.length > 0 && (
        <div style={{marginTop:9,display:"flex",flexDirection:"column",gap:6}}>
          {docs.map(doc => (
            <div key={doc.id} style={{display:"flex",alignItems:"center",gap:10,background:"#1e1e26",border:"1px solid #2a2a32",borderRadius:8,padding:"8px 12px"}}>
              {doc.type.startsWith("image/")
                ? <img src={doc.dataUrl} alt={doc.name} style={{width:32,height:32,borderRadius:5,objectFit:"cover",flexShrink:0,cursor:"pointer"}} onClick={()=>setPreviewDoc(doc)}/>
                : <div onClick={()=>setPreviewDoc(doc)} style={{cursor:"pointer"}}><FileIcon type={doc.type}/></div>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,color:"#e8e6e1",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{doc.name}</div>
                <div style={{fontSize:10,color:"#555",marginTop:1}}>{sz(doc.size)}</div>
              </div>
              <button onClick={()=>setPreviewDoc(doc)} style={{background:"none",border:"1px solid #2e2e3a",borderRadius:5,color:"#888",fontSize:11,padding:"3px 9px",cursor:"pointer",fontFamily:"inherit"}}>View</button>
              <button onClick={()=>onChange(prev=>prev.filter(d=>d.id!==doc.id))} style={{background:"none",border:"1px solid #3d2020",borderRadius:5,color:"#fb923c",fontSize:11,padding:"3px 7px",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
            </div>
          ))}
        </div>
      )}
      {previewDoc && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setPreviewDoc(null)}>
          <div style={{background:"#16161b",border:"1px solid #2a2a32",borderRadius:12,overflow:"hidden",maxWidth:800,width:"100%",maxHeight:"88vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",borderBottom:"1px solid #2a2a32"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}><FileIcon type={previewDoc.type}/>
                <div><div style={{fontSize:13,fontWeight:600,color:"#e8e6e1"}}>{previewDoc.name}</div></div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <a href={previewDoc.dataUrl} download={previewDoc.name} style={{background:"#1e1e2e",border:"1px solid #3a3a5e",color:"#a5b4fc",textDecoration:"none",padding:"6px 13px",borderRadius:6,fontSize:12}}>⬇ Download</a>
                <button onClick={()=>setPreviewDoc(null)} style={{background:"#2d1a1a",border:"1px solid #5c2020",color:"#fb923c",padding:"6px 11px",borderRadius:6,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
              </div>
            </div>
            <div style={{flex:1,overflow:"auto",padding:14,display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f11"}}>
              {previewDoc.type.startsWith("image/")
                ? <img src={previewDoc.dataUrl} alt={previewDoc.name} style={{maxWidth:"100%",maxHeight:"68vh",borderRadius:8,objectFit:"contain"}}/>
                : <iframe src={previewDoc.dataUrl} title={previewDoc.name} style={{width:"100%",height:"68vh",border:"none",borderRadius:8}}/>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── DROPDOWN SELECTOR with + Add ─────────────────────────────────────────────
function DropdownSelect({ label, value, options, onChange, onAddNew, placeholder = "Select…", colors = EB_COLORS, searchable = false }) {
  const [open, setOpen]     = useState(false);
  const [adding, setAdding] = useState(false);
  const [newVal, setNewVal] = useState("");
  const [newErr, setNewErr] = useState("");
  const [search, setSearch] = useState("");
  const ref     = useRef();
  const searchRef = useRef();

  // close on outside click
  const handleOutside = (e) => { if (ref.current && !ref.current.contains(e.target)) { setOpen(false); setSearch(""); } };
  useState(() => { document.addEventListener("mousedown", handleOutside); return () => document.removeEventListener("mousedown", handleOutside); });

  const filtered = searchable && search.trim()
    ? options.filter(o => o.toLowerCase().includes(search.trim().toLowerCase()))
    : options;

  const handleAdd = () => {
    const t = newVal.trim().toUpperCase();
    if (!t) { setNewErr("Enter a name"); return; }
    if (options.includes(t)) { setNewErr("Already exists"); return; }
    onAddNew(t);
    onChange(t);
    setNewVal(""); setNewErr(""); setAdding(false); setOpen(false); setSearch("");
  };

  const handleOpen = () => {
    setOpen(o => !o);
    setSearch("");
    setTimeout(() => searchRef.current && searchRef.current.focus(), 60);
  };

  return (
    <div ref={ref} style={{ position:"relative" }}>
      <label style={{ display:"block", fontSize:12, color:"#888", marginBottom:8, letterSpacing:".06em", textTransform:"uppercase" }}>{label}</label>
      <div
        onClick={handleOpen}
        style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#1e1e26", border:`1px solid ${open?"#5b5bf6":value?"#3e3e4e":"#2e2e3a"}`, borderRadius:8, padding:"12px 14px", cursor:"pointer", transition:"border .2s" }}
      >
        <div style={{ display:"flex", alignItems:"center", gap:9 }}>
          {value && (
            <div style={{ width:22, height:22, borderRadius:"50%", background:colors[options.indexOf(value) % colors.length], display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:800, color:"#0f0f11", flexShrink:0 }}>{value[0]}</div>
          )}
          <span style={{ fontSize:13, color: value ? "#e8e6e1" : "#555" }}>{value || placeholder}</span>
        </div>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" style={{ transform: open ? "rotate(180deg)" : "none", transition:"transform .2s", flexShrink:0 }}><polyline points="6,9 12,15 18,9"/></svg>
      </div>
      {open && (
        <div style={{ position:"absolute", top:"calc(100% + 4px)", left:0, right:0, background:"#1e1e26", border:"1px solid #3a3a4e", borderRadius:10, zIndex:200, overflow:"hidden", boxShadow:"0 12px 32px rgba(0,0,0,.6)" }}>
          {/* Search box inside dropdown */}
          {searchable && (
            <div style={{ padding:"10px 12px", borderBottom:"1px solid #2a2a32", position:"relative" }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" style={{ position:"absolute", left:22, top:"50%", transform:"translateY(-50%)" }}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input
                ref={searchRef}
                value={search}
                onChange={e => setSearch(e.target.value)}
                onKeyDown={e => {
                  if (e.key === "Escape") { setOpen(false); setSearch(""); }
                  if (e.key === "Enter" && filtered.length === 1) { onChange(filtered[0]); setOpen(false); setSearch(""); }
                }}
                placeholder="Type to search…"
                style={{ width:"100%", background:"#16161b", border:"1px solid #2e2e3a", borderRadius:6, padding:"7px 10px 7px 28px", color:"#e8e6e1", fontSize:12, fontFamily:"inherit", outline:"none" }}
                onClick={e => e.stopPropagation()}
              />
              {search && (
                <button onClick={e=>{e.stopPropagation();setSearch("");searchRef.current&&searchRef.current.focus();}}
                  style={{ position:"absolute", right:20, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:16, padding:0 }}>×</button>
              )}
            </div>
          )}
          <div style={{ maxHeight:240, overflowY:"auto" }}>
            {filtered.length === 0 ? (
              <div style={{ padding:"14px", textAlign:"center", color:"#555", fontSize:12 }}>No matches for "{search}"</div>
            ) : filtered.map((opt) => {
              const i = options.indexOf(opt);
              return (
                <div key={opt} onClick={() => { onChange(opt); setOpen(false); setSearch(""); }}
                  style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", cursor:"pointer", background: value===opt ? "#16162e" : "none",
                    borderLeft: value===opt ? `3px solid ${colors[i % colors.length]}` : "3px solid transparent",
                    transition:"background .15s" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#1a1a2e"}
                  onMouseLeave={e => e.currentTarget.style.background = value===opt ? "#16162e" : "transparent"}
                >
                  <div style={{ width:22, height:22, borderRadius:"50%", background:colors[i % colors.length], display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:800, color:"#0f0f11", flexShrink:0 }}>{opt[0]}</div>
                  <span style={{ fontSize:13, color: value===opt ? "#e8e6e1" : "#bbb" }}>
                    {search.trim() ? opt.split(new RegExp(`(${search.trim()})`, "gi")).map((part, idx) =>
                      part.toLowerCase() === search.trim().toLowerCase()
                        ? <mark key={idx} style={{ background:"#3a3a6e", color:"#a5b4fc", borderRadius:2, padding:"0 1px" }}>{part}</mark>
                        : part
                    ) : opt}
                  </span>
                  {value===opt && <span style={{ marginLeft:"auto", color:"#5b5bf6", fontSize:14 }}>✓</span>}
                </div>
              );
            })}
          </div>
          {/* Add new inline */}
          {!adding ? (
            <div onClick={e=>{e.stopPropagation();setAdding(true);}} style={{ padding:"10px 14px", cursor:"pointer", borderTop:"1px solid #2a2a32", display:"flex", alignItems:"center", gap:8, color:"#5b5bf6", fontSize:12 }}
              onMouseEnter={e=>e.currentTarget.style.background="#16162e"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span style={{fontSize:16,lineHeight:1}}>+</span> Add new name
            </div>
          ) : (
            <div style={{ padding:"10px 12px", borderTop:"1px solid #2a2a32", background:"#16161b" }}>
              <input value={newVal} onChange={e=>{setNewVal(e.target.value.toUpperCase());setNewErr("");}}
                onKeyDown={e=>{if(e.key==="Enter")handleAdd();if(e.key==="Escape"){setAdding(false);setNewVal("");}}}
                autoFocus placeholder="Type name…"
                style={{width:"100%",background:"#1a1a22",border:`1px solid ${newErr?"#fb923c":"#3a3a4a"}`,borderRadius:6,padding:"7px 10px",color:"#e8e6e1",fontSize:12,fontFamily:"inherit",outline:"none",marginBottom:6}}/>
              {newErr && <p style={{color:"#fb923c",fontSize:11,marginBottom:5}}>{newErr}</p>}
              <div style={{display:"flex",gap:6}}>
                <button onClick={handleAdd} style={{flex:1,background:"#5b5bf6",border:"none",color:"#fff",padding:"6px",borderRadius:6,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Add</button>
                <button onClick={()=>{setAdding(false);setNewVal("");setNewErr("");}} style={{background:"none",border:"1px solid #2e2e3a",color:"#888",padding:"6px 10px",borderRadius:6,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── DASHBOARD VIEW (scales to 50+ people) ────────────────────────────────────
const PAGE_SIZE = 10;
function DashboardView({ entries, people, perPersonStats, avatarColor, fmt, ebColor, onAddPerson, onPDF, onViewSheet, onNewEntry }) {
  const [search, setSearch] = useState("");
  const [sortBy, setSortBy] = useState("name"); // name | bills | payments | balance
  const [sortDir, setSortDir] = useState(1);
  const [page, setPage] = useState(0);

  // Group totals by currency
  const currencyTotals = useMemo(() => {
    const map = {};
    entries.forEach(e => {
      const c = e.currency || "USD";
      if (!map[c]) map[c] = { bills:0, payments:0 };
      if (e.type==="Bill") map[c].bills += e.amount;
      else map[c].payments += e.amount;
    });
    return Object.entries(map).map(([code, v]) => ({ code, ...v, balance: v.payments - v.bills }));
  }, [entries]);
  const totalBills    = entries.filter(e=>e.type==="Bill").reduce((s,e)=>s+e.amount,0);
  const totalPayments = entries.filter(e=>e.type==="Payment").reduce((s,e)=>s+e.amount,0);
  const totalBalance  = totalPayments - totalBills;

  const filtered = perPersonStats
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => {
      if (sortBy==="name") return sortDir * a.name.localeCompare(b.name);
      return sortDir * (a[sortBy] - b[sortBy]);
    });

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const paged = filtered.slice(page * PAGE_SIZE, (page+1) * PAGE_SIZE);

  const toggleSort = (col) => {
    if (sortBy===col) setSortDir(d=>d*-1);
    else { setSortBy(col); setSortDir(1); }
    setPage(0);
  };

  const SortIcon = ({col}) => (
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
      style={{marginLeft:4, opacity: sortBy===col?1:0.3, transform: sortBy===col&&sortDir===-1?"rotate(180deg)":"none"}}>
      <polyline points="6,9 12,15 18,9"/>
    </svg>
  );

  return (
    <div>
      {/* Title */}
      <div className="dash-header" style={{marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"flex-end"}}>
        <div>
          <h1 style={{fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:24, letterSpacing:"-.03em", marginBottom:2}}>Account Overview</h1>
          <p style={{color:"#555", fontSize:12}}>{people.length} accounts · {entries.length} transactions</p>
        </div>
        <button onClick={onAddPerson} style={{display:"flex",alignItems:"center",gap:7,background:"#1e1e2e",border:"1px solid #3a3a5e",color:"#a5b4fc",padding:"7px 14px",borderRadius:8,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12}}>
          + Add Account
        </button>
      </div>

      {/* Global summary cards — single row, all currencies */}
      <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:16}}>
        {[
          {label:"Total Bills",    icon:"📤", cls:"balance-neg", key:"bills"},
          {label:"Total Payments", icon:"📥", cls:"balance-pos", key:"payments"},
          {label:"Overall Balance",icon:"⚖️", key:"balance"},
        ].map(s=>(
          <div key={s.label} className="stat-card" style={{padding:"14px 18px"}}>
            <div style={{fontSize:16,marginBottom:4}}>{s.icon}</div>
            <div style={{color:"#555",fontSize:10,marginBottom:6,letterSpacing:".06em",textTransform:"uppercase"}}>{s.label}</div>
            {currencyTotals.length === 0 ? (
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,color:"#333"}}>—</div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:3}}>
                {currencyTotals.map(ct => {
                  const val = ct[s.key];
                  const cls = s.key==="balance" ? (val>=0?"balance-pos":"balance-neg") : s.cls;
                  return (
                    <div key={ct.code} style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:9,color:"#5b5bf6",background:"#1e1e3a",border:"1px solid #3a3a5e",padding:"2px 6px",borderRadius:3,fontWeight:600,minWidth:32,textAlign:"center"}}>{ct.code}</span>
                      <span className={cls} style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14,whiteSpace:"nowrap"}}>{fmtC(val,ct.code)}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Accounts table */}
      <div className="card accounts-table-wrap" style={{padding:0, overflow:"hidden", marginBottom:16}}>
        {/* Table toolbar */}
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"10px 16px", borderBottom:"1px solid #2a2a32", gap:12, flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13}}>All Accounts</span>
          <div style={{display:"flex", alignItems:"center", gap:8, flex:1, justifyContent:"flex-end", flexWrap:"wrap"}}>
            <div style={{position:"relative", maxWidth:240, flex:1, minWidth:140}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}>
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} placeholder="Search accounts…"
                style={{width:"100%",background:"#1e1e26",border:"1px solid #2e2e3a",borderRadius:7,padding:"7px 12px 7px 32px",color:"#e8e6e1",fontSize:12,fontFamily:"'DM Mono',monospace",outline:"none"}}/>
            </div>
            {search && (
              <button onClick={()=>{setSearch("");setPage(0);}}
                style={{background:"#2d1a1a",border:"1px solid #5c2020",color:"#fb923c",fontFamily:"'DM Mono',monospace",fontSize:11,padding:"5px 10px",borderRadius:6,cursor:"pointer",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
                ✕ Clear
              </button>
            )}
            <span style={{fontSize:11,color:"#555",whiteSpace:"nowrap"}}>{filtered.length} of {people.length}</span>
          </div>
        </div>

        {/* Scrollable table body */}
        <div style={{overflowX:"auto", WebkitOverflowScrolling:"touch"}}>
        <div style={{minWidth:600}}>
        {/* Column headers */}
        <div style={{display:"grid", gridTemplateColumns:"1fr 200px 200px 260px 90px", padding:"8px 16px", background:"#12121a", borderBottom:"1px solid #2a2a32"}}>
          {[
            {key:"name",     label:"ACCOUNT"},
            {key:"bills",    label:"BILLS"},
            {key:"payments", label:"PAYMENTS"},
            {key:"balance",  label:"BALANCE"},
            {key:null,       label:"PDF"},
          ].map(({key,label},i)=>(
            <div key={i} onClick={key?()=>toggleSort(key):undefined}
              style={{display:"flex",alignItems:"center",fontSize:10,color:sortBy===key?"#a5b4fc":"#555",letterSpacing:".08em",fontWeight:600,cursor:key?"pointer":"default",userSelect:"none",justifyContent:i>0?"flex-end":"flex-start"}}>
              {label}{key&&<SortIcon col={key}/>}
            </div>
          ))}
        </div>

        {/* Rows */}
        {paged.length === 0 && (
          <div style={{textAlign:"center",padding:"30px",color:"#555",fontSize:13}}>No accounts match your search.</div>
        )}
        {paged.map((p,i)=>{
          const color = AVATAR_COLORS[people.indexOf(p.name) % AVATAR_COLORS.length];
          const txCount = entries.filter(e=>e.name===p.name).length;
          return (
            <div key={p.name} className="sheet-row" style={{display:"grid", gridTemplateColumns:"1fr 200px 200px 260px 90px", padding:"9px 16px", borderBottom:i<paged.length-1?"1px solid #1e1e26":"none", alignItems:"center"}}>
              {/* Account */}
              <div style={{display:"flex", alignItems:"center", gap:9}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:color,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:12,color:"#fff",flexShrink:0}}>{p.name[0]}</div>
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:color,fontFamily:"'Syne',sans-serif"}}>{p.name}</div>
                  <div style={{fontSize:10,color:"#444",marginTop:1}}>{txCount} transaction{txCount!==1?"s":""}</div>
                </div>
              </div>
              {/* Bills */}
              <div style={{textAlign:"right"}}>
                {p.currencies && Object.keys(p.currencies).length > 0 ? (
                  Object.entries(p.currencies).map(([code, v]) => (
                    <div key={code} style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4,marginBottom:2}}>
                      <span style={{fontSize:9,color:"#555",whiteSpace:"nowrap"}}>{code}</span>
                      <span style={{fontSize:11,fontWeight:700,color:"#fb923c",whiteSpace:"nowrap"}}>{fmtC(v.bills,code)}</span>
                    </div>
                  ))
                ) : <div style={{fontSize:12,fontWeight:700,color:"#fb923c"}}>$0.00</div>}
              </div>
              {/* Payments */}
              <div style={{textAlign:"right"}}>
                {p.currencies && Object.keys(p.currencies).length > 0 ? (
                  Object.entries(p.currencies).map(([code, v]) => (
                    <div key={code} style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4,marginBottom:2}}>
                      <span style={{fontSize:9,color:"#555",whiteSpace:"nowrap"}}>{code}</span>
                      <span style={{fontSize:11,fontWeight:700,color:"#34d399",whiteSpace:"nowrap"}}>{fmtC(v.payments,code)}</span>
                    </div>
                  ))
                ) : <div style={{fontSize:12,fontWeight:700,color:"#34d399"}}>$0.00</div>}
              </div>
              {/* Balance */}
              <div style={{textAlign:"right"}}>
                {p.currencies && Object.keys(p.currencies).length > 0 ? (
                  Object.entries(p.currencies).map(([code, v]) => {
                    const bal = v.payments - v.bills;
                    return (
                      <div key={code} style={{marginBottom:2}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
                          <span style={{fontSize:9,color:"#5b5bf6",background:"#1e1e3a",border:"1px solid #3a3a5e",padding:"1px 5px",borderRadius:3,whiteSpace:"nowrap"}}>{code}</span>
                          <span className={bal>=0?"balance-pos":"balance-neg"} style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:12,whiteSpace:"nowrap"}}>{fmtC(bal,code)}</span>
                        </div>
                        <div style={{fontSize:10,color:"#555",textAlign:"right"}}>{bal>=0?"in credit":"outstanding"}</div>
                      </div>
                    );
                  })
                ) : (
                  <div>
                    <div className="balance-pos" style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13}}>$0.00</div>
                    <div style={{fontSize:10,color:"#555"}}>in credit</div>
                  </div>
                )}
              </div>
              {/* PDF */}
              <div style={{textAlign:"right"}}>
                <button className="btn-pdf" style={{padding:"4px 10px",fontSize:11}} onClick={()=>onPDF(p.name)}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>PDF
                </button>
              </div>
            </div>
          );
        })}

        {/* Totals footer */}
        {filtered.length > 0 && (
          <div style={{display:"grid", gridTemplateColumns:"1fr 200px 200px 260px 90px", padding:"9px 16px", borderTop:"1px solid #2a2a32", background:"#12121a"}}>
            <span style={{fontSize:11,color:"#555",fontWeight:600}}>TOTAL ({filtered.length} accounts)</span>
            <div style={{textAlign:"right"}}>
              {Object.entries(filtered.reduce((acc,p)=>{
                if(p.currencies) Object.entries(p.currencies).forEach(([code,v])=>{
                  if(!acc[code]) acc[code]={bills:0};
                  acc[code].bills += v.bills;
                });
                return acc;
              },{})).map(([code,v])=>(
                <div key={code} style={{fontSize:11,fontWeight:700,color:"#fb923c",whiteSpace:"nowrap"}}>{code} {fmtC(v.bills,code)}</div>
              ))}
            </div>
            <div style={{textAlign:"right"}}>
              {Object.entries(filtered.reduce((acc,p)=>{
                if(p.currencies) Object.entries(p.currencies).forEach(([code,v])=>{
                  if(!acc[code]) acc[code]={payments:0};
                  acc[code].payments += v.payments;
                });
                return acc;
              },{})).map(([code,v])=>(
                <div key={code} style={{fontSize:11,fontWeight:700,color:"#34d399",whiteSpace:"nowrap"}}>{code} {fmtC(v.payments,code)}</div>
              ))}
            </div>
            <div style={{textAlign:"right"}}>
              {Object.entries(filtered.reduce((acc,p)=>{
                if(p.currencies) Object.entries(p.currencies).forEach(([code,v])=>{
                  if(!acc[code]) acc[code]=0;
                  acc[code] += v.payments - v.bills;
                });
                return acc;
              },{})).map(([code,bal])=>(
                <div key={code} className={bal>=0?"balance-pos":"balance-neg"} style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:12,whiteSpace:"nowrap"}}>{code} {fmtC(bal,code)}</div>
              ))}
            </div>
            <span/>
          </div>
        )}

        </div>{/* end minWidth */}
        </div>{/* end scroll wrapper */}
        {/* Pagination */}
        {totalPages > 1 && (
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"9px 16px",borderTop:"1px solid #1e1e26"}}>
            <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0}
              style={{background:"none",border:"1px solid #2e2e3a",color:page===0?"#333":"#888",padding:"4px 11px",borderRadius:6,cursor:page===0?"default":"pointer",fontFamily:"inherit",fontSize:12}}>← Prev</button>
            {Array.from({length:totalPages},(_,i)=>(
              <button key={i} onClick={()=>setPage(i)}
                style={{background:page===i?"#5b5bf6":"none",border:`1px solid ${page===i?"#5b5bf6":"#2e2e3a"}`,color:page===i?"#fff":"#888",width:28,height:28,borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>
                {i+1}
              </button>
            ))}
            <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1}
              style={{background:"none",border:"1px solid #2e2e3a",color:page===totalPages-1?"#333":"#888",padding:"4px 11px",borderRadius:6,cursor:page===totalPages-1?"default":"pointer",fontFamily:"inherit",fontSize:12}}>Next →</button>
          </div>
        )}
      </div>


    </div>
  );
}

// ── ACCOUNT DETAIL COMPONENT ──────────────────────────────────────────────────
function AccountDetail({ entries, people, avatarColor, fmt, ebColor, onPDF }) {
  const [selected, setSelected] = useState(null);
  const [acctSearch, setAcctSearch] = useState("");
  const [acctFilter, setAcctFilter] = useState("");
  const [previewDocs, setPreviewDocs] = useState(null); // {docs, idx}

  const color = selected ? avatarColor(selected) : "#5b5bf6";

  const filteredPeople = acctFilter.trim()
    ? people.filter(p => p.toLowerCase().includes(acctFilter.trim().toLowerCase()))
    : people;

  // Compute entries for selected account
  const acctEntries = selected
    ? entries.filter(e => {
        if (e.name !== selected) return false;
        if (!acctSearch.trim()) return true;
        const q = acctSearch.trim().toLowerCase();
        return (
          (e.txnId && e.txnId.toLowerCase().includes(q)) ||
          (e.source && e.source.toLowerCase().includes(q)) ||
          (e.entryBy && e.entryBy.toLowerCase().includes(q)) ||
          e.type.toLowerCase().includes(q) ||
          String(e.amount).includes(q)
        );
      })
    : [];
  const bills    = acctEntries.filter(e => e.type === "Bill").reduce((s, e) => s + e.amount, 0);
  const payments = acctEntries.filter(e => e.type === "Payment").reduce((s, e) => s + e.amount, 0);
  const balance  = payments - bills;

  if (!selected) {
    return (
      <div>
        <div style={{ marginBottom:20, display:"flex", justifyContent:"space-between", alignItems:"flex-end", flexWrap:"wrap", gap:12 }}>
          <div>
            <h1 style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:28, letterSpacing:"-.02em", marginBottom:4 }}>Accounts</h1>
            <p style={{ color:"#555", fontSize:13 }}>{filteredPeople.length} of {people.length} accounts</p>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ position:"relative" }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)" }}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input value={acctFilter} onChange={e=>setAcctFilter(e.target.value)}
                placeholder="Search accounts…"
                style={{ background:"#1e1e26", border:"1px solid #2e2e3a", borderRadius:8, padding:"9px 32px 9px 32px", color:"#e8e6e1", fontSize:13, fontFamily:"'DM Mono',monospace", outline:"none", width:220 }}
                onFocus={e=>e.target.style.borderColor="#5b5bf6"}
                onBlur={e=>e.target.style.borderColor="#2e2e3a"}/>
              {acctFilter && <button onClick={()=>setAcctFilter("")} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:18, padding:0 }}>×</button>}
            </div>
            {acctFilter && (
              <button onClick={()=>setAcctFilter("")}
                style={{ background:"#2d1a1a", border:"1px solid #5c2020", color:"#fb923c", fontFamily:"'DM Mono',monospace", fontSize:12, padding:"8px 14px", borderRadius:8, cursor:"pointer" }}>
                ✕ Clear
              </button>
            )}
          </div>
        </div>
        {people.length === 0 ? (
          <div style={{ textAlign:"center", padding:"60px 20px", color:"#555" }}>
            <div style={{ fontSize:40, marginBottom:12 }}>👤</div>
            <p>No accounts yet. Add accounts from Home tab.</p>
          </div>
        ) : (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:14 }}>
            {filteredPeople.length === 0 ? (
              <div style={{ gridColumn:"1/-1", textAlign:"center", padding:"40px", color:"#555" }}>No accounts match "{acctFilter}"</div>
            ) : filteredPeople.map(p => {
              const c = avatarColor(p);
              const txns = entries.filter(e => e.name === p);
              const cMap = {};
              txns.forEach(e => {
                const cur = e.currency||"USD";
                if (!cMap[cur]) cMap[cur] = {bills:0,payments:0};
                if (e.type==="Bill") cMap[cur].bills += e.amount;
                else cMap[cur].payments += e.amount;
              });
              return (
                <div key={p}
                  onClick={() => { setSelected(p); setAcctSearch(""); }}
                  className="stat-card"
                  style={{ cursor:"pointer", padding:20, position:"relative", overflow:"hidden", transition:"all .2s" }}
                  onMouseEnter={e=>{ e.currentTarget.style.borderColor=c+"88"; e.currentTarget.style.transform="translateY(-2px)"; }}
                  onMouseLeave={e=>{ e.currentTarget.style.borderColor="#2a2a32"; e.currentTarget.style.transform="none"; }}>
                  <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:c, borderRadius:"12px 12px 0 0" }}/>
                  <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>
                    <div style={{ width:40, height:40, borderRadius:"50%", background:c, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, fontWeight:800, color:"#fff", flexShrink:0 }}>{p[0]}</div>
                    <div>
                      <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:14, color:c }}>{p}</div>
                      <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{txns.length} transaction{txns.length!==1?"s":""}</div>
                    </div>
                  </div>
                  {Object.keys(cMap).length === 0 ? (
                    <div style={{ fontSize:12, color:"#333" }}>No transactions yet</div>
                  ) : (
                    Object.entries(cMap).map(([code, v]) => {
                      const bal = v.payments - v.bills;
                      return (
                        <div key={code} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                          <span style={{ fontSize:9, color:"#5b5bf6", background:"#1e1e3a", border:"1px solid #3a3a5e", padding:"1px 5px", borderRadius:3 }}>{code}</span>
                          <span className={bal>=0?"balance-pos":"balance-neg"} style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13 }}>{fmtC(bal,code)}</span>
                        </div>
                      );
                    })
                  )}
                  <div style={{ marginTop:12, fontSize:10, color:"#444", textAlign:"right" }}>View details →</div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // ── DETAIL VIEW (account selected) ───────────────────────────────────────
  const runningByCurrency = {};

  return (
    <div className="card" style={{ padding:0, overflow:"hidden" }}>
      {/* Back bar */}
      <div className="acct-back-bar" style={{ padding:"14px 20px", borderBottom:"1px solid #2a2a32", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <button onClick={() => { setSelected(null); setAcctSearch(""); }}
            style={{ background:"#1e1e26", border:"1px solid #2e2e3a", color:"#888", fontFamily:"'DM Mono',monospace", fontSize:12, padding:"7px 12px", borderRadius:7, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#5b5bf6"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#2e2e3a"}>
            ← Back
          </button>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:28, height:28, borderRadius:"50%", background:color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#fff" }}>{selected[0]}</div>
            <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:15 }}>{selected}</span>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ position:"relative" }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)" }}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input value={acctSearch} onChange={e=>setAcctSearch(e.target.value)}
              placeholder="Search transactions…"
              style={{ background:"#1e1e26", border:"1px solid #2e2e3a", borderRadius:7, padding:"8px 32px 8px 30px", color:"#e8e6e1", fontSize:12, fontFamily:"'DM Mono',monospace", outline:"none", width:220 }}
              onFocus={e=>e.target.style.borderColor="#5b5bf6"}
              onBlur={e=>e.target.style.borderColor="#2e2e3a"}/>
            {acctSearch && <button onClick={()=>setAcctSearch("")} style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:16, padding:0 }}>×</button>}
          </div>
          <button className="btn-pdf" onClick={()=>onPDF(selected)}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
            PDF
          </button>
        </div>
      </div>

      {/* Summary strip - per currency */}
      {(() => {
        const cMap = {};
        acctEntries.forEach(e => {
          const c = e.currency||"USD";
          if (!cMap[c]) cMap[c] = {bills:0, payments:0};
          if (e.type==="Bill") cMap[c].bills += e.amount;
          else cMap[c].payments += e.amount;
        });
        return Object.entries(cMap).map(([code, v], ci) => {
          const cBal = v.payments - v.bills;
          return (
            <div key={code} style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))", borderBottom:"1px solid #2a2a32", borderTop: ci>0?"1px solid #1e1e26":"none" }}>
              {[
                { label:"Bills",    value:v.bills,    color:"#fb923c" },
                { label:"Payments", value:v.payments, color:"#34d399" },
                { label:"Balance",  value:cBal,       color:cBal>=0?"#34d399":"#fb923c" },
              ].map((s, i) => (
                <div key={i} style={{ padding:"12px 20px", borderRight:i<2?"1px solid #2a2a32":"none", position:"relative" }}>
                  {i===0 && <span style={{position:"absolute",top:8,left:8,fontSize:9,color:"#5b5bf6",background:"#1e1e3a",border:"1px solid #3a3a5e",padding:"1px 5px",borderRadius:3,fontWeight:600}}>{code}</span>}
                  <div style={{ fontSize:10, color:"#555", letterSpacing:".07em", textTransform:"uppercase", marginBottom:3, marginTop: i===0?12:0 }}>{s.label}</div>
                  <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:16, color:s.color }}>{fmtC(s.value, code)}</div>
                </div>
              ))}
            </div>
          );
        });
      })()}

      {/* Table */}
      <div className="sheet-scroll" style={{ overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
        <div style={{ minWidth:900 }}>
          {/* Header */}
          <div style={{ display:"grid", gridTemplateColumns:"120px 130px 90px 150px 160px 170px 55px", padding:"10px 20px", background:"#12121a", borderBottom:"1px solid #2a2a32" }}>
            {["SUB. ID","DATE","TYPE","DETAILS","AMOUNT","BALANCE","DOCS"].map((h,i) => (
              <span key={i} style={{ fontSize:10, color: i===0?"#a5b4fc":i===1?"#f59e0b":"#555", letterSpacing:".08em", fontWeight:500 }}>{h}</span>
            ))}
          </div>
          {acctEntries.length === 0 && (
            <div style={{ padding:"30px", textAlign:"center", color:"#555", fontSize:13 }}>No transactions for {selected} yet.</div>
          )}
          {acctEntries.map((e, i) => {
            const cur = e.currency || "USD";
            if (!runningByCurrency[cur]) runningByCurrency[cur] = 0;
            runningByCurrency[cur] += e.type === "Payment" ? e.amount : -e.amount;
            const bal = runningByCurrency[cur];
            return (
              <div key={e.id} className="sheet-row" style={{ display:"grid", gridTemplateColumns:"120px 130px 90px 150px 160px 170px 55px", padding:"11px 20px", borderBottom:i<acctEntries.length-1?"1px solid #1e1e26":"none", alignItems:"center" }}>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:600, color:"#a5b4fc", background:"#1a1a2e", border:"1px solid #3a3a5e", padding:"3px 7px", borderRadius:5, display:"inline-block" }}>{e.txnId||"—"}</span>
                <div>
                  {e.createdAt ? (
                    <>
                      <div style={{ fontSize:11, color:"#e8e6e1" }}>{new Date(e.createdAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}</div>
                    </>
                  ) : <span style={{color:"#333",fontSize:11}}>—</span>}
                </div>
                <span className={`tag tag-${e.type.toLowerCase()}`}>{e.type}</span>
                <span style={{ fontSize:12, color:"#888", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.source || <span style={{color:"#333"}}>—</span>}</span>
                <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13, color:e.type==="Bill"?"#fb923c":"#34d399" }}>
                  {e.type==="Bill"?"-":"+"}{fmtC(e.amount, cur)}
                </span>
                <div>
                  <span className={bal>=0?"balance-pos":"balance-neg"} style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13 }}>{fmtC(bal, cur)}</span>
                  {cur !== "USD" && <span style={{ marginLeft:4, fontSize:9, color:"#5b5bf6", background:"#1e1e3a", border:"1px solid #3a3a5e", padding:"1px 4px", borderRadius:3 }}>{cur}</span>}
                </div>
                <div>
                  {e.docs&&e.docs.length>0
                    ? <span className="doc-badge" onClick={()=>setPreviewDocs({docs:e.docs,idx:0})} title="Click to view attachments">📎 {e.docs.length}</span>
                    : <span style={{color:"#333",fontSize:11}}>—</span>}
                </div>
              </div>
            );
          })}
          {acctEntries.length > 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"120px 130px 90px 150px 160px 170px 55px", padding:"12px 20px", borderTop:"1px solid #2a2a32", background:"#12121a" }}>
              <span/><span/><span/>
              <span style={{ fontSize:11, color:"#888", fontWeight:600 }}>TOTAL</span>
              <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:13, color:"#e8e6e1" }}>{fmt(bills+payments)}</span>
              <span className={balance>=0?"balance-pos":"balance-neg"} style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:13 }}>{fmt(balance)}</span>
              <span/>
            </div>
          )}
        </div>
      </div>
      {/* ── ATTACHMENT VIEWER MODAL ── */}
      {previewDocs && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setPreviewDocs(null)}>
          <div style={{background:"#16161b",border:"1px solid #2a2a32",borderRadius:14,overflow:"hidden",maxWidth:860,width:"100%",maxHeight:"90vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",borderBottom:"1px solid #2a2a32",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>📎</span>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:"#e8e6e1"}}>{previewDocs.docs[previewDocs.idx].name}</div>
                  <div style={{fontSize:10,color:"#555"}}>{previewDocs.idx+1} of {previewDocs.docs.length} attachment{previewDocs.docs.length>1?"s":""}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {previewDocs.docs.length > 1 && (<>
                  <button onClick={()=>setPreviewDocs(p=>({...p,idx:Math.max(0,p.idx-1)}))} disabled={previewDocs.idx===0}
                    style={{background:"#1e1e26",border:"1px solid #2e2e3a",color:previewDocs.idx===0?"#333":"#888",padding:"6px 11px",borderRadius:6,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>◀</button>
                  <button onClick={()=>setPreviewDocs(p=>({...p,idx:Math.min(p.docs.length-1,p.idx+1)}))} disabled={previewDocs.idx===previewDocs.docs.length-1}
                    style={{background:"#1e1e26",border:"1px solid #2e2e3a",color:previewDocs.idx===previewDocs.docs.length-1?"#333":"#888",padding:"6px 11px",borderRadius:6,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>▶</button>
                </>)}
                <a href={previewDocs.docs[previewDocs.idx].dataUrl} download={previewDocs.docs[previewDocs.idx].name}
                  style={{background:"#1e1e2e",border:"1px solid #3a3a5e",color:"#a5b4fc",textDecoration:"none",padding:"6px 13px",borderRadius:6,fontSize:12,display:"flex",alignItems:"center",gap:5}}>
                  ⬇ Download
                </a>
                <button onClick={()=>setPreviewDocs(null)} style={{background:"#2d1a1a",border:"1px solid #5c2020",color:"#fb923c",padding:"6px 11px",borderRadius:6,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
              </div>
            </div>
            {previewDocs.docs.length > 1 && (
              <div style={{display:"flex",gap:8,padding:"10px 18px",borderBottom:"1px solid #1e1e26",background:"#12121a",overflowX:"auto"}}>
                {previewDocs.docs.map((d,i)=>(
                  <div key={i} onClick={()=>setPreviewDocs(p=>({...p,idx:i}))}
                    style={{flexShrink:0,width:52,height:52,borderRadius:7,border:`2px solid ${i===previewDocs.idx?"#5b5bf6":"#2a2a32"}`,overflow:"hidden",cursor:"pointer",background:"#1e1e26",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {d.type.startsWith("image/") ? <img src={d.dataUrl} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{fontSize:20}}>📄</span>}
                  </div>
                ))}
              </div>
            )}
            <div style={{flex:1,overflow:"auto",padding:20,display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f11",minHeight:300}}>
              {previewDocs.docs[previewDocs.idx].type.startsWith("image/")
                ? <img src={previewDocs.docs[previewDocs.idx].dataUrl} alt={previewDocs.docs[previewDocs.idx].name} style={{maxWidth:"100%",maxHeight:"65vh",borderRadius:8,objectFit:"contain",boxShadow:"0 4px 32px rgba(0,0,0,.6)"}}/>
                : previewDocs.docs[previewDocs.idx].type==="application/pdf"
                  ? <iframe src={previewDocs.docs[previewDocs.idx].dataUrl} style={{width:"100%",height:"65vh",border:"none",borderRadius:8}} title={previewDocs.docs[previewDocs.idx].name}/>
                  : <div style={{textAlign:"center",color:"#555"}}>
                      <div style={{fontSize:48,marginBottom:12}}>📄</div>
                      <p>Preview not available — <a href={previewDocs.docs[previewDocs.idx].dataUrl} download={previewDocs.docs[previewDocs.idx].name} style={{color:"#a5b4fc"}}>Download to view</a></p>
                    </div>
              }
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── REQUEST HISTORY VIEW ──────────────────────────────────────────────────────
function RequestHistoryView({ pendingEntries, requestHistory, people, entryByList, handleClearHistory, handleClearOne }) {
  const [statusFilter, setStatusFilter] = useState("pending");

  const allRequests = [
    ...pendingEntries.map(e => ({...e, status:"pending"})),
    ...requestHistory
  ];
  const filtered = statusFilter === "all" ? allRequests : allRequests.filter(r => r.status === statusFilter);
  const pendingCount  = pendingEntries.length;
  const approvedCount = requestHistory.filter(r=>r.status==="approved").length;
  const rejectedCount = requestHistory.filter(r=>r.status==="rejected").length;

  const StatusBadge = ({status}) => {
    const cfg = {
      pending:  { bg:"#1e1600", border:"#5a3d00", color:"#f59e0b", dot:"#f59e0b", label:"Pending"  },
      approved: { bg:"#0a2018", border:"#0f4a2a", color:"#34d399", dot:"#34d399", label:"Approved" },
      rejected: { bg:"#2a0f0f", border:"#5c1a1a", color:"#fb923c", dot:"#fb923c", label:"Rejected" },
    }[status] || { bg:"#1e1e26", border:"#2e2e3a", color:"#888", dot:"#888", label:status };
    return (
      <span style={{display:"inline-flex",alignItems:"center",gap:5,background:cfg.bg,border:`1px solid ${cfg.border}`,borderRadius:20,padding:"3px 10px",fontSize:11,color:cfg.color,fontWeight:600,whiteSpace:"nowrap"}}>
        <span style={{width:6,height:6,borderRadius:"50%",background:cfg.dot,display:"inline-block",boxShadow:`0 0 4px ${cfg.dot}`}}/>
        {cfg.label}
      </span>
    );
  };

  return (
    <div>
      {/* Header */}
      <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:22,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:26,letterSpacing:"-.03em",marginBottom:4}}>Request History</h1>
          <p style={{color:"#666",fontSize:13}}>All bill submissions — view only · only admin can act</p>
        </div>
        {(approvedCount > 0 || rejectedCount > 0) && (
          <button onClick={handleClearHistory}
            style={{display:"flex",alignItems:"center",gap:7,background:"#2a0f0f",border:"1.5px solid #5c1a1a",color:"#fb923c",fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,padding:"9px 16px",borderRadius:8,cursor:"pointer"}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6M14,11v6"/><path d="M9,6V4a1,1,0,0,1,1-1h4a1,1,0,0,1,1,1v2"/></svg>
            Clear History
          </button>
        )}
      </div>

      {/* Status filter tabs */}
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
        {[
          {key:"all",      label:"All",      count:allRequests.length, col:"#888"},
          {key:"pending",  label:"Pending",  count:pendingCount,       col:"#f59e0b"},
          {key:"approved", label:"Approved", count:approvedCount,      col:"#34d399"},
          {key:"rejected", label:"Rejected", count:rejectedCount,      col:"#fb923c"},
        ].map(t=>(
          <button key={t.key} onClick={()=>setStatusFilter(t.key)}
            style={{display:"flex",alignItems:"center",gap:7,padding:"7px 16px",borderRadius:20,fontFamily:"'DM Mono',monospace",fontSize:12,cursor:"pointer",border:`1.5px solid ${statusFilter===t.key?t.col:"#2a2a32"}`,background:statusFilter===t.key?`${t.col}18`:"transparent",color:statusFilter===t.key?t.col:"#666",transition:"all .15s",fontWeight:statusFilter===t.key?700:400}}>
            {t.label}
            <span style={{background:statusFilter===t.key?t.col:"#2a2a32",color:statusFilter===t.key?"#0f0f11":"#555",borderRadius:20,fontSize:10,fontWeight:900,padding:"1px 7px",minWidth:20,textAlign:"center"}}>{t.count}</span>
          </button>
        ))}
