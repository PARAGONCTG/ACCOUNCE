    const { useState, useMemo, useRef, useEffect } = React;

const TYPES = ["Bill", "Payment"];
const CURRENCIES = [
  { code:"USD", symbol:"$",  label:"US Dollar" },
  { code:"CNY", symbol:"¥",  label:"Chinese RMB" },
  { code:"BDT", symbol:"৳",  label:"Bangladeshi Taka" },

];

};

const initialData = [
  { id: 1, txnId: "TXN-0001", name: "LYNN",   type: "Bill",    amount: 1200, source: "Office",  entryBy: "AZIM",  createdAt: "2025-01-10T09:15:00", docs: [] },

];

const fmt = (v) => new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(v);
const fmtC = (v, code="USD") => {
  try { return new Intl.NumberFormat("en-US", { style:"currency", currency: code }).format(v); }
  catch { const cur = getCurrency(code); return cur.symbol + Number(v).toFixed(2); }
};
const AVATAR_COLORS = ["#5b5bf6","#f59e0b","#10b981","#ef4444","#8b5cf6","#06b6d4","#f43f5e"];
const EB_COLORS    = ["#a78bfa","#fb923c","#34d399","#f472b6","#60a5fa","#facc15","#e879f9"];

// ── PDF GENERATOR ─────────────────────────────────────────────────────────────
function generatePDF(person, entries, people) {
  const pe    = entries.filter(e => e.name === person);
  const color = AVATAR_COLORS[people.indexOf(person) % AVATAR_COLORS.length];
  const today = new Date().toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" });

  // Group by currency
  const cMap = {};
  pe.forEach(e => {
    const c = e.currency || "USD";
    if (!cMap[c]) cMap[c] = { bills:0, payments:0 };
    if (e.type === "Bill") cMap[c].bills += e.amount;
    else cMap[c].payments += e.amount;
  });
  const currencies = Object.keys(cMap);

  // Summary cards — single 3-card row, all currencies listed inside each card
  const overallBal = currencies.reduce((s,c) => s + (cMap[c].payments - cMap[c].bills), 0);
  const summaryCards = `
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px">
    <div style="border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px">
      <div style="font-size:10px;color:#9ca3af;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px">Total Bills</div>
      ${currencies.map(code => `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <span style="font-size:9px;font-weight:700;color:#6366f1;background:#f5f3ff;border:1px solid #e0e7ff;padding:1px 6px;border-radius:3px;min-width:30px;text-align:center">${code}</span>
        <span style="font-size:15px;font-weight:800;color:#dc2626">${fmtC(cMap[code].bills,code)}</span>
      </div>`).join("")}
    </div>
    <div style="border:1px solid #e5e7eb;border-radius:10px;padding:16px 18px">
      <div style="font-size:10px;color:#9ca3af;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px">Total Payments</div>
      ${currencies.map(code => `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <span style="font-size:9px;font-weight:700;color:#6366f1;background:#f5f3ff;border:1px solid #e0e7ff;padding:1px 6px;border-radius:3px;min-width:30px;text-align:center">${code}</span>
        <span style="font-size:15px;font-weight:800;color:#16a34a">${fmtC(cMap[code].payments,code)}</span>
      </div>`).join("")}
    </div>
    <div style="border:2px solid #e5e7eb;border-radius:10px;padding:16px 18px">
      <div style="font-size:10px;color:#9ca3af;letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px">Balance</div>
      ${currencies.map(code => { const bal=cMap[code].payments-cMap[code].bills; return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
        <span style="font-size:9px;font-weight:700;color:#6366f1;background:#f5f3ff;border:1px solid #e0e7ff;padding:1px 6px;border-radius:3px;min-width:30px;text-align:center">${code}</span>
        <span style="font-size:15px;font-weight:800;color:${bal>=0?"#16a34a":"#dc2626"}">${fmtC(bal,code)}</span>
      </div>`; }).join("")}
    </div>
  </div>`;

  // Transaction rows — running balance per currency
  const runningMap = {};
  const rows = pe.map((e, i) => {
    const code = e.currency || "USD";
    if (!runningMap[code]) runningMap[code] = 0;
    runningMap[code] += e.type === "Payment" ? e.amount : -e.amount;
    const running   = runningMap[code];
    const balColor  = running >= 0 ? "#16a34a" : "#dc2626";
    const typeColor = e.type === "Bill" ? "#dc2626" : "#16a34a";
    const bg        = i % 2 === 0 ? "#ffffff" : "#f8f9ff";
    const docsHtml  = e.docs && e.docs.length > 0
      ? e.docs.map(d => `<span style="font-size:10px;background:#f1f5f9;border:1px solid #e2e8f0;padding:2px 6px;border-radius:4px;color:#64748b">📎 ${d.name}</span>`).join(" ")
      : '<span style="color:#d1d5db;font-size:11px">—</span>';
    return `<tr style="background:${bg}">
      <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-size:11px;font-family:monospace;color:#6366f1;background:#f5f3ff;font-weight:600">${e.txnId || "#"+(i+1)}</td>
      <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-size:11px;color:#6b7280">${e.createdAt ? new Date(e.createdAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—"}</td>
      <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb"><span style="background:${e.type==="Bill"?"#fef2f2":"#f0fdf4"};color:${typeColor};border:1px solid ${e.type==="Bill"?"#fca5a5":"#86efac"};padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600">${e.type.toUpperCase()}</span></td>
      <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-size:12px;color:#374151">${e.source || "—"}</td>
      <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-size:12px;color:#6b7280">${e.entryBy || "—"}</td>
      <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-size:11px;font-weight:700;color:#6366f1;text-align:center">
        <span style="background:#f5f3ff;border:1px solid #e0e7ff;padding:1px 6px;border-radius:3px;font-size:10px">${code}</span>
      </td>
      <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-size:13px;font-weight:700;color:#111827;text-align:right">${fmtC(e.amount,code)}</td>
      <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-size:13px;font-weight:700;color:${balColor};text-align:right">${fmtC(running,code)}</td>
      <td style="padding:9px 12px;border-bottom:1px solid #e5e7eb;font-size:11px">${docsHtml}</td>
    </tr>`;
  }).join("");

  // Footer totals per currency
  const footerRows = currencies.map(code => {
    const v = cMap[code];
    const bal = v.payments - v.bills;
    return `<tr style="background:#f9fafb">
      <td colspan="4" style="padding:9px 12px;font-size:11px;font-weight:700;color:#374151;border-top:1px solid #e5e7eb">
        <span style="background:#f5f3ff;border:1px solid #e0e7ff;color:#6366f1;padding:2px 8px;border-radius:4px;font-size:10px">${code}</span> TOTAL
      </td>
      <td style="border-top:1px solid #e5e7eb"></td>
      <td style="padding:9px 12px;text-align:right;font-size:12px;font-weight:800;color:#dc2626;border-top:1px solid #e5e7eb">${fmtC(v.bills,code)}</td>
      <td style="padding:9px 12px;text-align:right;font-size:12px;font-weight:800;color:#16a34a;border-top:1px solid #e5e7eb">${fmtC(v.payments,code)}</td>
      <td style="padding:9px 12px;text-align:right;font-size:12px;font-weight:800;color:${bal>=0?"#16a34a":"#dc2626"};border-top:1px solid #e5e7eb">${fmtC(bal,code)}</td>
      <td style="border-top:1px solid #e5e7eb"></td>
    </tr>`;
  }).join("");

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Account of ${person}</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:#fff;color:#111827;-webkit-print-color-adjust:exact;print-color-adjust:exact}
@page{margin:24mm 16mm;size:A4}@media print{.no-print{display:none!important}}</style></head><body>
<div style="max-width:820px;margin:0 auto;padding:28px 0">
  <div class="no-print" style="text-align:right;margin-bottom:20px">
    <button onclick="window.print()" style="background:#5b5bf6;color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">🖨️ Print / Save as PDF</button>
  </div>
  <div style="background:${color};border-radius:14px;padding:28px 32px;margin-bottom:24px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-30px;right:-30px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.08)"></div>
    <div style="position:relative">
      <div style="font-size:10px;font-weight:600;color:rgba(255,255,255,.65);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">Account Statement</div>
      <h1 style="font-size:32px;font-weight:800;color:#fff;letter-spacing:-.02em;margin-bottom:3px">Account of ${person}</h1>
      <div style="font-size:12px;color:rgba(255,255,255,.7)">Generated on ${today}</div>
    </div>
  </div>
  ${summaryCards}
  <div style="border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;margin-bottom:24px;margin-top:16px">
    <div style="background:#f9fafb;padding:12px 14px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between">
      <span style="font-size:13px;font-weight:700;color:#374151">Transaction History</span>
      <span style="font-size:11px;color:#9ca3af">${pe.length} records</span>
    </div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="background:#f1f5f9">
        <th style="padding:9px 12px;text-align:left;font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.06em;text-transform:uppercase">ID</th>
        <th style="padding:9px 12px;text-align:left;font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.06em;text-transform:uppercase">Date</th>
        <th style="padding:9px 12px;text-align:left;font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.06em;text-transform:uppercase">Type</th>
        <th style="padding:9px 12px;text-align:left;font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.06em;text-transform:uppercase">Details</th>
        <th style="padding:9px 12px;text-align:left;font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.06em;text-transform:uppercase">Prepared By</th>
        <th style="padding:9px 12px;text-align:center;font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.06em;text-transform:uppercase">Currency</th>
        <th style="padding:9px 12px;text-align:right;font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.06em;text-transform:uppercase">Amount</th>
        <th style="padding:9px 12px;text-align:right;font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.06em;text-transform:uppercase">Balance</th>
        <th style="padding:9px 12px;text-align:left;font-size:10px;color:#6b7280;font-weight:600;letter-spacing:.06em;text-transform:uppercase">Docs</th>
      </tr></thead>
      <tbody>${rows}</tbody>
      <tfoot>${footerRows}</tfoot>
    </table>
  </div>
  <div style="display:flex;justify-content:space-between;padding-top:14px;border-top:1px solid #e5e7eb">
    <span style="font-size:11px;color:#9ca3af">Paragon — Account System</span>
    <span style="font-size:11px;color:#9ca3af">${today}</span>
  </div>
</div></body></html>`;
  const blob = new Blob([html], { type:"text/html" });
  const url  = URL.createObjectURL(blob);
  const win  = window.open(url, "_blank");
  if (!win) {
    // fallback: download as file
    const a = document.createElement("a");
    a.href = url;
    a.download = `Paragon-${person}-Statement.html`;
    a.click();
  }
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}

// ── FILE ICON ─────────────────────────────────────────────────────────────────
function FileIcon({ type }) {
  const isPdf = type === "application/pdf";
  return (
    <div style={{ width:32,height:32,borderRadius:6,background:isPdf?"#2d1a1a":"#1a1a2d",border:`1px solid ${isPdf?"#5c2020":"#2a2a5c"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0 }}>
      {isPdf
        ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f87171" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
      }
    </div>
  );
}

// ── DOC UPLOADER ──────────────────────────────────────────────────────────────
function DocUploader({ docs, onChange }) {
  const inputRef = useRef();
  const [dragging, setDragging] = useState(false);
  const [previewDoc, setPreviewDoc] = useState(null);
  const handleFiles = (fileList) => {
    Array.from(fileList).filter(f => f.type === "application/pdf" || f.type.startsWith("image/")).forEach(f => {
      const reader = new FileReader();
      reader.onload = ev => onChange(prev => [...prev, { id: Date.now()+Math.random(), name:f.name, type:f.type, size:f.size, dataUrl:ev.target.result }]);
      reader.readAsDataURL(f);
    });
  };
  const sz = b => b < 1048576 ? `${(b/1024).toFixed(0)} KB` : `${(b/1048576).toFixed(1)} MB`;
  return (
    <div>
      <div onDragOver={e=>{e.preventDefault();setDragging(true)}} onDragLeave={()=>setDragging(false)}
        onDrop={e=>{e.preventDefault();setDragging(false);handleFiles(e.dataTransfer.files)}}
        onClick={()=>inputRef.current.click()}
        style={{border:`2px dashed ${dragging?"#5b5bf6":"#2e2e3a"}`,borderRadius:10,padding:"18px",textAlign:"center",cursor:"pointer",background:dragging?"#16162e":"#1a1a22",transition:"all .2s"}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={dragging?"#5b5bf6":"#444"} strokeWidth="1.5" style={{margin:"0 auto 7px",display:"block"}}>
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17,8 12,3 7,8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p style={{fontSize:12,color:dragging?"#a5b4fc":"#666",marginBottom:2}}>{dragging?"Drop here":"Click or drag to upload"}</p>
        <p style={{fontSize:10,color:"#444"}}>PDF, JPG, PNG, WEBP</p>
        <input ref={inputRef} type="file" multiple accept="application/pdf,image/*" style={{display:"none"}} onChange={e=>handleFiles(e.target.files)}/>
      </div>
      {docs.length > 0 && (
        <div style={{marginTop:9,display:"flex",flexDirection:"column",gap:6}}>
          {docs.map(doc => (
            <div key={doc.id} style={{display:"flex",alignItems:"center",gap:10,background:"#1e1e26",border:"1px solid #2a2a32",borderRadius:8,padding:"8px 12px"}}>
              {doc.type.startsWith("image/")
                ? <img src={doc.dataUrl} alt={doc.name} style={{width:32,height:32,borderRadius:5,objectFit:"cover",flexShrink:0,cursor:"pointer"}} onClick={()=>setPreviewDoc(doc)}/>
                : <div onClick={()=>setPreviewDoc(doc)} style={{cursor:"pointer"}}><FileIcon type={doc.type}/></div>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,color:"#e8e6e1",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{doc.name}</div>
                <div style={{fontSize:10,color:"#555",marginTop:1}}>{sz(doc.size)}</div>
              </div>
              <button onClick={()=>setPreviewDoc(doc)} style={{background:"none",border:"1px solid #2e2e3a",borderRadius:5,color:"#888",fontSize:11,padding:"3px 9px",cursor:"pointer",fontFamily:"inherit"}}>View</button>
              <button onClick={()=>onChange(prev=>prev.filter(d=>d.id!==doc.id))} style={{background:"none",border:"1px solid #3d2020",borderRadius:5,color:"#f87171",fontSize:11,padding:"3px 7px",cursor:"pointer",fontFamily:"inherit"}}>✕</button>
            </div>
          ))}
        </div>
      )}
      {previewDoc && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:24}} onClick={()=>setPreviewDoc(null)}>
          <div style={{background:"#16161b",border:"1px solid #2a2a32",borderRadius:12,overflow:"hidden",maxWidth:800,width:"100%",maxHeight:"88vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",borderBottom:"1px solid #2a2a32"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}><FileIcon type={previewDoc.type}/>
                <div><div style={{fontSize:13,fontWeight:600,color:"#e8e6e1"}}>{previewDoc.name}</div></div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <a href={previewDoc.dataUrl} download={previewDoc.name} style={{background:"#1e1e2e",border:"1px solid #3a3a5e",color:"#a5b4fc",textDecoration:"none",padding:"6px 13px",borderRadius:6,fontSize:12}}>⬇ Download</a>
                <button onClick={()=>setPreviewDoc(null)} style={{background:"#2d1a1a",border:"1px solid #5c2020",color:"#f87171",padding:"6px 11px",borderRadius:6,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
              </div>
            </div>
            <div style={{flex:1,overflow:"auto",padding:14,display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f11"}}>
              {previewDoc.type.startsWith("image/")
                ? <img src={previewDoc.dataUrl} alt={previewDoc.name} style={{maxWidth:"100%",maxHeight:"68vh",borderRadius:8,objectFit:"contain"}}/>
                : <iframe src={previewDoc.dataUrl} title={previewDoc.name} style={{width:"100%",height:"68vh",border:"none",borderRadius:8}}/>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── DROPDOWN SELECTOR with + Add ─────────────────────────────────────────────
function DropdownSelect({ label, value, options, onChange, onAddNew, placeholder = "Select…", colors = EB_COLORS }) {
  const [open, setOpen] = useState(false);
  const [adding, setAdding] = useState(false);
  const [newVal, setNewVal] = useState("");
  const [newErr, setNewErr] = useState("");
  const ref = useRef();

  // close on outside click
  const handleOutside = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
  useState(() => { document.addEventListener("mousedown", handleOutside); return () => document.removeEventListener("mousedown", handleOutside); });

  const handleAdd = () => {
    const t = newVal.trim().toUpperCase();
    if (!t) { setNewErr("Enter a name"); return; }
    if (options.includes(t)) { setNewErr("Already exists"); return; }
    onAddNew(t);
    onChange(t);
    setNewVal(""); setNewErr(""); setAdding(false); setOpen(false);
  };

  return (
    <div ref={ref} style={{ position:"relative" }}>
      <label style={{ display:"block", fontSize:12, color:"#888", marginBottom:8, letterSpacing:".06em", textTransform:"uppercase" }}>{label}</label>
      <div
        onClick={() => setOpen(o => !o)}
        style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:"#1e1e26", border:`1px solid ${value?"#3e3e4e":"#2e2e3a"}`, borderRadius:8, padding:"12px 14px", cursor:"pointer", transition:"border .2s" }}
      >
        <div style={{ display:"flex", alignItems:"center", gap:9 }}>
          {value && (
            <div style={{ width:22, height:22, borderRadius:"50%", background:colors[options.indexOf(value) % colors.length], display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:800, color:"#0f0f11", flexShrink:0 }}>{value[0]}</div>
          )}
          <span style={{ fontSize:13, color: value ? "#e8e6e1" : "#555" }}>{value || placeholder}</span>
        </div>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" style={{ transform: open ? "rotate(180deg)" : "none", transition:"transform .2s" }}><polyline points="6,9 12,15 18,9"/></svg>
      </div>
      {open && (
        <div style={{ position:"absolute", top:"calc(100% + 4px)", left:0, right:0, background:"#1e1e26", border:"1px solid #2e2e3a", borderRadius:10, zIndex:100, overflow:"hidden", boxShadow:"0 8px 24px rgba(0,0,0,.5)" }}>
          <div style={{ maxHeight:220, overflowY:"auto" }}>
            {options.map((opt, i) => (
              <div key={opt} onClick={() => { onChange(opt); setOpen(false); }}
                style={{ display:"flex", alignItems:"center", gap:10, padding:"10px 14px", cursor:"pointer", background: value===opt ? "#16162e" : "none",
                  borderLeft: value===opt ? `3px solid ${colors[i % colors.length]}` : "3px solid transparent",
                  transition:"background .15s" }}
                onMouseEnter={e => e.currentTarget.style.background = "#1a1a2e"}
                onMouseLeave={e => e.currentTarget.style.background = value===opt ? "#16162e" : "transparent"}
              >
                <div style={{ width:22, height:22, borderRadius:"50%", background:colors[i % colors.length], display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:800, color:"#0f0f11", flexShrink:0 }}>{opt[0]}</div>
                <span style={{ fontSize:13, color: value===opt ? "#e8e6e1" : "#bbb" }}>{opt}</span>
                {value===opt && <span style={{ marginLeft:"auto", color:"#5b5bf6", fontSize:14 }}>✓</span>}
              </div>
            ))}
          </div>
          {/* Add new inline */}
          {!adding ? (
            <div onClick={()=>setAdding(true)} style={{ padding:"10px 14px", cursor:"pointer", borderTop:"1px solid #2a2a32", display:"flex", alignItems:"center", gap:8, color:"#5b5bf6", fontSize:12 }}
              onMouseEnter={e=>e.currentTarget.style.background="#16162e"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <span style={{fontSize:16,lineHeight:1}}>+</span> Add new name
            </div>
          ) : (
            <div style={{ padding:"10px 12px", borderTop:"1px solid #2a2a32", background:"#16161b" }}>
              <input value={newVal} onChange={e=>{setNewVal(e.target.value.toUpperCase());setNewErr("");}}
                onKeyDown={e=>{if(e.key==="Enter")handleAdd();if(e.key==="Escape"){setAdding(false);setNewVal("");}}}
                autoFocus placeholder="Type name…"
                style={{width:"100%",background:"#1a1a22",border:`1px solid ${newErr?"#f87171":"#3a3a4a"}`,borderRadius:6,padding:"7px 10px",color:"#e8e6e1",fontSize:12,fontFamily:"inherit",outline:"none",marginBottom:6}}/>
              {newErr && <p style={{color:"#f87171",fontSize:11,marginBottom:5}}>{newErr}</p>}
              <div style={{display:"flex",gap:6}}>
                <button onClick={handleAdd} style={{flex:1,background:"#5b5bf6",border:"none",color:"#fff",padding:"6px",borderRadius:6,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Add</button>
                <button onClick={()=>{setAdding(false);setNewVal("");setNewErr("");}} style={{background:"none",border:"1px solid #2e2e3a",color:"#888",padding:"6px 10px",borderRadius:6,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── DASHBOARD VIEW (scales to 50+ people) ────────────────────────────────────
const PAGE_SIZE = 10;
function DashboardView({ entries, people, perPersonStats, avatarColor, fmt, ebColor, onAddPerson, onPDF, onViewSheet, onNewEntry }) {
  const [search, setSearch] = useState("");
  const [sortBy, setSortBy] = useState("name"); // name | bills | payments | balance
  const [sortDir, setSortDir] = useState(1);
  const [page, setPage] = useState(0);

  // Group totals by currency
  const currencyTotals = useMemo(() => {
    const map = {};
    entries.forEach(e => {
      const c = e.currency || "USD";
      if (!map[c]) map[c] = { bills:0, payments:0 };
      if (e.type==="Bill") map[c].bills += e.amount;
      else map[c].payments += e.amount;
    });
    return Object.entries(map).map(([code, v]) => ({ code, ...v, balance: v.payments - v.bills }));
  }, [entries]);
  const totalBills    = entries.filter(e=>e.type==="Bill").reduce((s,e)=>s+e.amount,0);
  const totalPayments = entries.filter(e=>e.type==="Payment").reduce((s,e)=>s+e.amount,0);
  const totalBalance  = totalPayments - totalBills;

  const filtered = perPersonStats
    .filter(p => p.name.toLowerCase().includes(search.toLowerCase()))
    .sort((a,b) => {
      if (sortBy==="name") return sortDir * a.name.localeCompare(b.name);
      return sortDir * (a[sortBy] - b[sortBy]);
    });

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const paged = filtered.slice(page * PAGE_SIZE, (page+1) * PAGE_SIZE);

  const toggleSort = (col) => {
    if (sortBy===col) setSortDir(d=>d*-1);
    else { setSortBy(col); setSortDir(1); }
    setPage(0);
  };

  const SortIcon = ({col}) => (
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"
      style={{marginLeft:4, opacity: sortBy===col?1:0.3, transform: sortBy===col&&sortDir===-1?"rotate(180deg)":"none"}}>
      <polyline points="6,9 12,15 18,9"/>
    </svg>
  );

  return (
    <div>
      {/* Title */}
      <div className="dash-header" style={{marginBottom:22, display:"flex", justifyContent:"space-between", alignItems:"flex-end"}}>
        <div>
          <h1 style={{fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:28, letterSpacing:"-.03em", marginBottom:4}}>Account Overview</h1>
          <p style={{color:"#555", fontSize:13}}>{people.length} accounts · {entries.length} transactions</p>
        </div>
        <button onClick={onAddPerson} style={{display:"flex",alignItems:"center",gap:7,background:"#1e1e2e",border:"1px solid #3a3a5e",color:"#a5b4fc",padding:"9px 16px",borderRadius:8,cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12}}>
          + Add Account
        </button>
      </div>

      {/* Global summary cards — single row, all currencies */}
      <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:14, marginBottom:24}}>
        {[
          {label:"Total Bills",    icon:"📤", cls:"balance-neg", key:"bills"},
          {label:"Total Payments", icon:"📥", cls:"balance-pos", key:"payments"},
          {label:"Overall Balance",icon:"⚖️", key:"balance"},
        ].map(s=>(
          <div key={s.label} className="stat-card">
            <div style={{fontSize:18,marginBottom:6}}>{s.icon}</div>
            <div style={{color:"#555",fontSize:11,marginBottom:8,letterSpacing:".06em",textTransform:"uppercase"}}>{s.label}</div>
            {currencyTotals.length === 0 ? (
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:22,color:"#333"}}>—</div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:4}}>
                {currencyTotals.map(ct => {
                  const val = ct[s.key];
                  const cls = s.key==="balance" ? (val>=0?"balance-pos":"balance-neg") : s.cls;
                  return (
                    <div key={ct.code} style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:9,color:"#5b5bf6",background:"#1e1e3a",border:"1px solid #3a3a5e",padding:"2px 6px",borderRadius:3,fontWeight:600,minWidth:32,textAlign:"center"}}>{ct.code}</span>
                      <span className={cls} style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16,whiteSpace:"nowrap"}}>{fmtC(val,ct.code)}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* Accounts table */}
      <div className="card accounts-table-wrap" style={{padding:0, overflow:"hidden", marginBottom:24}}>
        {/* Table toolbar */}
        <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", padding:"14px 18px", borderBottom:"1px solid #2a2a32", gap:12, flexWrap:"wrap"}}>
          <span style={{fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:15}}>All Accounts</span>
          <div style={{display:"flex", alignItems:"center", gap:8, flex:1, justifyContent:"flex-end", flexWrap:"wrap"}}>
            {/* Search */}
            <div style={{position:"relative", maxWidth:240, flex:1, minWidth:140}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)"}}>
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} placeholder="Search accounts…"
                style={{width:"100%",background:"#1e1e26",border:"1px solid #2e2e3a",borderRadius:7,padding:"8px 12px 8px 32px",color:"#e8e6e1",fontSize:12,fontFamily:"'DM Mono',monospace",outline:"none"}}/>
            </div>
            {/* Clear search */}
            {search && (
              <button
                onClick={()=>{setSearch("");setPage(0);}}
                style={{background:"#2d1a1a",border:"1px solid #5c2020",color:"#f87171",fontFamily:"'DM Mono',monospace",fontSize:11,padding:"6px 12px",borderRadius:6,cursor:"pointer",display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}
              >
                ✕ Clear
              </button>
            )}
            <span style={{fontSize:12,color:"#555",whiteSpace:"nowrap"}}>{filtered.length} of {people.length}</span>
          </div>
        </div>

        {/* Column headers */}
        <div style={{display:"grid", gridTemplateColumns:"1fr 200px 200px 260px 90px", padding:"10px 18px", background:"#12121a", borderBottom:"1px solid #2a2a32"}}>
          {[
            {key:"name",     label:"ACCOUNT"},
            {key:"bills",    label:"BILLS"},
            {key:"payments", label:"PAYMENTS"},
            {key:"balance",  label:"BALANCE"},
            {key:null,       label:"PDF"},
          ].map(({key,label},i)=>(
            <div key={i} onClick={key?()=>toggleSort(key):undefined}
              style={{display:"flex",alignItems:"center",fontSize:10,color:sortBy===key?"#a5b4fc":"#555",letterSpacing:".08em",fontWeight:600,cursor:key?"pointer":"default",userSelect:"none",justifyContent:i>0?"flex-end":"flex-start"}}>
              {label}{key&&<SortIcon col={key}/>}
            </div>
          ))}
        </div>

        {/* Rows */}
        {paged.length === 0 && (
          <div style={{textAlign:"center",padding:"40px",color:"#555",fontSize:13}}>No accounts match your search.</div>
        )}
        {paged.map((p,i)=>{
          const color = AVATAR_COLORS[people.indexOf(p.name) % AVATAR_COLORS.length];
          const txCount = entries.filter(e=>e.name===p.name).length;
          return (
            <div key={p.name} className="sheet-row" style={{display:"grid", gridTemplateColumns:"1fr 200px 200px 260px 90px", padding:"12px 18px", borderBottom:i<paged.length-1?"1px solid #1e1e26":"none", alignItems:"center"}}>
              {/* Account */}
              <div style={{display:"flex", alignItems:"center", gap:11}}>
                <div style={{width:34,height:34,borderRadius:"50%",background:color,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,color:"#fff",flexShrink:0}}>{p.name[0]}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:color,fontFamily:"'Syne',sans-serif"}}>{p.name}</div>
                  <div style={{fontSize:11,color:"#444",marginTop:1}}>{txCount} transaction{txCount!==1?"s":""}</div>
                </div>
              </div>
              {/* Bills */}
              <div style={{textAlign:"right"}}>
                {p.currencies && Object.keys(p.currencies).length > 0 ? (
                  Object.entries(p.currencies).map(([code, v]) => (
                    <div key={code} style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4,marginBottom:2}}>
                      <span style={{fontSize:9,color:"#555",whiteSpace:"nowrap"}}>{code}</span>
                      <span style={{fontSize:12,fontWeight:700,color:"#f87171",whiteSpace:"nowrap"}}>{fmtC(v.bills,code)}</span>
                    </div>
                  ))
                ) : <div style={{fontSize:13,fontWeight:700,color:"#f87171"}}>$0.00</div>}
              </div>
              {/* Payments */}
              <div style={{textAlign:"right"}}>
                {p.currencies && Object.keys(p.currencies).length > 0 ? (
                  Object.entries(p.currencies).map(([code, v]) => (
                    <div key={code} style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4,marginBottom:2}}>
                      <span style={{fontSize:9,color:"#555",whiteSpace:"nowrap"}}>{code}</span>
                      <span style={{fontSize:12,fontWeight:700,color:"#4ade80",whiteSpace:"nowrap"}}>{fmtC(v.payments,code)}</span>
                    </div>
                  ))
                ) : <div style={{fontSize:13,fontWeight:700,color:"#4ade80"}}>$0.00</div>}
              </div>
              {/* Balance */}
              <div style={{textAlign:"right"}}>
                {p.currencies && Object.keys(p.currencies).length > 0 ? (
                  Object.entries(p.currencies).map(([code, v]) => {
                    const bal = v.payments - v.bills;
                    return (
                      <div key={code} style={{marginBottom:3}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>
                          <span style={{fontSize:9,color:"#5b5bf6",background:"#1e1e3a",border:"1px solid #3a3a5e",padding:"1px 5px",borderRadius:3,whiteSpace:"nowrap"}}>{code}</span>
                          <span className={bal>=0?"balance-pos":"balance-neg"} style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:13,whiteSpace:"nowrap"}}>{fmtC(bal,code)}</span>
                        </div>
                        <div style={{fontSize:10,color:"#555",textAlign:"right"}}>{bal>=0?"in credit":"outstanding"}</div>
                      </div>
                    );
                  })
                ) : (
                  <div>
                    <div className="balance-pos" style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14}}>$0.00</div>
                    <div style={{fontSize:10,color:"#555"}}>in credit</div>
                  </div>
                )}
              </div>
              {/* PDF */}
              <div style={{textAlign:"right"}}>
                <button className="btn-pdf" style={{padding:"4px 10px",fontSize:11}} onClick={()=>onPDF(p.name)}>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>PDF
                </button>
              </div>
            </div>
          );
        })}

        {/* Totals footer */}
        {filtered.length > 0 && (
          <div style={{display:"grid", gridTemplateColumns:"1fr 200px 200px 260px 90px", padding:"12px 18px", borderTop:"1px solid #2a2a32", background:"#12121a"}}>
            <span style={{fontSize:11,color:"#555",fontWeight:600}}>TOTAL ({filtered.length} accounts)</span>
            <div style={{textAlign:"right"}}>
              {Object.entries(filtered.reduce((acc,p)=>{
                if(p.currencies) Object.entries(p.currencies).forEach(([code,v])=>{
                  if(!acc[code]) acc[code]={bills:0};
                  acc[code].bills += v.bills;
                });
                return acc;
              },{})).map(([code,v])=>(
                <div key={code} style={{fontSize:11,fontWeight:700,color:"#f87171",whiteSpace:"nowrap"}}>{code} {fmtC(v.bills,code)}</div>
              ))}
            </div>
            <div style={{textAlign:"right"}}>
              {Object.entries(filtered.reduce((acc,p)=>{
                if(p.currencies) Object.entries(p.currencies).forEach(([code,v])=>{
                  if(!acc[code]) acc[code]={payments:0};
                  acc[code].payments += v.payments;
                });
                return acc;
              },{})).map(([code,v])=>(
                <div key={code} style={{fontSize:11,fontWeight:700,color:"#4ade80",whiteSpace:"nowrap"}}>{code} {fmtC(v.payments,code)}</div>
              ))}
            </div>
            <div style={{textAlign:"right"}}>
              {Object.entries(filtered.reduce((acc,p)=>{
                if(p.currencies) Object.entries(p.currencies).forEach(([code,v])=>{
                  if(!acc[code]) acc[code]=0;
                  acc[code] += v.payments - v.bills;
                });
                return acc;
              },{})).map(([code,bal])=>(
                <div key={code} className={bal>=0?"balance-pos":"balance-neg"} style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:12,whiteSpace:"nowrap"}}>{code} {fmtC(bal,code)}</div>
              ))}
            </div>
            <span/>
          </div>
        )}

        {/* Pagination */}
        {totalPages > 1 && (
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"12px 18px",borderTop:"1px solid #1e1e26"}}>
            <button onClick={()=>setPage(p=>Math.max(0,p-1))} disabled={page===0}
              style={{background:"none",border:"1px solid #2e2e3a",color:page===0?"#333":"#888",padding:"5px 12px",borderRadius:6,cursor:page===0?"default":"pointer",fontFamily:"inherit",fontSize:12}}>← Prev</button>
            {Array.from({length:totalPages},(_,i)=>(
              <button key={i} onClick={()=>setPage(i)}
                style={{background:page===i?"#5b5bf6":"none",border:`1px solid ${page===i?"#5b5bf6":"#2e2e3a"}`,color:page===i?"#fff":"#888",width:32,height:32,borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:12}}>
                {i+1}
              </button>
            ))}
            <button onClick={()=>setPage(p=>Math.min(totalPages-1,p+1))} disabled={page===totalPages-1}
              style={{background:"none",border:"1px solid #2e2e3a",color:page===totalPages-1?"#333":"#888",padding:"5px 12px",borderRadius:6,cursor:page===totalPages-1?"default":"pointer",fontFamily:"inherit",fontSize:12}}>Next →</button>
          </div>
        )}
      </div>


    </div>
  );
}

// ── ACCOUNT DETAIL COMPONENT ──────────────────────────────────────────────────
function AccountDetail({ entries, people, avatarColor, fmt, ebColor, onPDF }) {
  const [selected, setSelected] = useState(null);
  const [acctSearch, setAcctSearch] = useState("");
  const [acctFilter, setAcctFilter] = useState("");
  const [previewDocs, setPreviewDocs] = useState(null); // {docs, idx}

  const color = selected ? avatarColor(selected) : "#5b5bf6";

  const filteredPeople = acctFilter.trim()
    ? people.filter(p => p.toLowerCase().includes(acctFilter.trim().toLowerCase()))
    : people;

  // Compute entries for selected account
  const acctEntries = selected
    ? entries.filter(e => {
        if (e.name !== selected) return false;
        if (!acctSearch.trim()) return true;
        const q = acctSearch.trim().toLowerCase();
        return (
          (e.txnId && e.txnId.toLowerCase().includes(q)) ||
          (e.source && e.source.toLowerCase().includes(q)) ||
          (e.entryBy && e.entryBy.toLowerCase().includes(q)) ||
          e.type.toLowerCase().includes(q) ||
          String(e.amount).includes(q)
        );
      })
    : [];
  const bills    = acctEntries.filter(e => e.type === "Bill").reduce((s, e) => s + e.amount, 0);
  const payments = acctEntries.filter(e => e.type === "Payment").reduce((s, e) => s + e.amount, 0);
  const balance  = payments - bills;

  if (!selected) {
    return (
      <div>
        <div style={{ marginBottom:20, display:"flex", justifyContent:"space-between", alignItems:"flex-end", flexWrap:"wrap", gap:12 }}>
          <div>
            <h1 style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:28, letterSpacing:"-.02em", marginBottom:4 }}>Accounts</h1>
            <p style={{ color:"#555", fontSize:13 }}>{filteredPeople.length} of {people.length} accounts</p>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ position:"relative" }}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)" }}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input value={acctFilter} onChange={e=>setAcctFilter(e.target.value)}
                placeholder="Search accounts…"
                style={{ background:"#1e1e26", border:"1px solid #2e2e3a", borderRadius:8, padding:"9px 32px 9px 32px", color:"#e8e6e1", fontSize:13, fontFamily:"'DM Mono',monospace", outline:"none", width:220 }}
                onFocus={e=>e.target.style.borderColor="#5b5bf6"}
                onBlur={e=>e.target.style.borderColor="#2e2e3a"}/>
              {acctFilter && <button onClick={()=>setAcctFilter("")} style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:18, padding:0 }}>×</button>}
            </div>
            {acctFilter && (
              <button onClick={()=>setAcctFilter("")}
                style={{ background:"#2d1a1a", border:"1px solid #5c2020", color:"#f87171", fontFamily:"'DM Mono',monospace", fontSize:12, padding:"8px 14px", borderRadius:8, cursor:"pointer" }}>
                ✕ Clear
              </button>
            )}
          </div>
        </div>
        {people.length === 0 ? (
          <div style={{ textAlign:"center", padding:"60px 20px", color:"#555" }}>
            <div style={{ fontSize:40, marginBottom:12 }}>👤</div>
            <p>No accounts yet. Add accounts from Home tab.</p>
          </div>
        ) : (
          <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:14 }}>
            {filteredPeople.length === 0 ? (
              <div style={{ gridColumn:"1/-1", textAlign:"center", padding:"40px", color:"#555" }}>No accounts match "{acctFilter}"</div>
            ) : filteredPeople.map(p => {
              const c = avatarColor(p);
              const txns = entries.filter(e => e.name === p);
              const cMap = {};
              txns.forEach(e => {
                const cur = e.currency||"USD";
                if (!cMap[cur]) cMap[cur] = {bills:0,payments:0};
                if (e.type==="Bill") cMap[cur].bills += e.amount;
                else cMap[cur].payments += e.amount;
              });
              return (
                <div key={p}
                  onClick={() => { setSelected(p); setAcctSearch(""); }}
                  className="stat-card"
                  style={{ cursor:"pointer", padding:20, position:"relative", overflow:"hidden", transition:"all .2s" }}
                  onMouseEnter={e=>{ e.currentTarget.style.borderColor=c+"88"; e.currentTarget.style.transform="translateY(-2px)"; }}
                  onMouseLeave={e=>{ e.currentTarget.style.borderColor="#2a2a32"; e.currentTarget.style.transform="none"; }}>
                  <div style={{ position:"absolute", top:0, left:0, right:0, height:3, background:c, borderRadius:"12px 12px 0 0" }}/>
                  <div style={{ display:"flex", alignItems:"center", gap:12, marginBottom:14 }}>
                    <div style={{ width:40, height:40, borderRadius:"50%", background:c, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, fontWeight:800, color:"#fff", flexShrink:0 }}>{p[0]}</div>
                    <div>
                      <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:14, color:c }}>{p}</div>
                      <div style={{ fontSize:11, color:"#555", marginTop:2 }}>{txns.length} transaction{txns.length!==1?"s":""}</div>
                    </div>
                  </div>
                  {Object.keys(cMap).length === 0 ? (
                    <div style={{ fontSize:12, color:"#333" }}>No transactions yet</div>
                  ) : (
                    Object.entries(cMap).map(([code, v]) => {
                      const bal = v.payments - v.bills;
                      return (
                        <div key={code} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:4 }}>
                          <span style={{ fontSize:9, color:"#5b5bf6", background:"#1e1e3a", border:"1px solid #3a3a5e", padding:"1px 5px", borderRadius:3 }}>{code}</span>
                          <span className={bal>=0?"balance-pos":"balance-neg"} style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13 }}>{fmtC(bal,code)}</span>
                        </div>
                      );
                    })
                  )}
                  <div style={{ marginTop:12, fontSize:10, color:"#444", textAlign:"right" }}>View details →</div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  }

  // ── DETAIL VIEW (account selected) ───────────────────────────────────────
  const runningByCurrency = {};

  return (
    <div className="card" style={{ padding:0, overflow:"hidden" }}>
      {/* Back bar */}
      <div style={{ padding:"14px 20px", borderBottom:"1px solid #2a2a32", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <button onClick={() => { setSelected(null); setAcctSearch(""); }}
            style={{ background:"#1e1e26", border:"1px solid #2e2e3a", color:"#888", fontFamily:"'DM Mono',monospace", fontSize:12, padding:"7px 12px", borderRadius:7, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}
            onMouseEnter={e=>e.currentTarget.style.borderColor="#5b5bf6"}
            onMouseLeave={e=>e.currentTarget.style.borderColor="#2e2e3a"}>
            ← Back
          </button>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            <div style={{ width:28, height:28, borderRadius:"50%", background:color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#fff" }}>{selected[0]}</div>
            <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:15 }}>{selected}</span>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ position:"relative" }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)" }}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input value={acctSearch} onChange={e=>setAcctSearch(e.target.value)}
              placeholder="Search transactions…"
              style={{ background:"#1e1e26", border:"1px solid #2e2e3a", borderRadius:7, padding:"8px 32px 8px 30px", color:"#e8e6e1", fontSize:12, fontFamily:"'DM Mono',monospace", outline:"none", width:220 }}
              onFocus={e=>e.target.style.borderColor="#5b5bf6"}
              onBlur={e=>e.target.style.borderColor="#2e2e3a"}/>
            {acctSearch && <button onClick={()=>setAcctSearch("")} style={{ position:"absolute", right:8, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:16, padding:0 }}>×</button>}
          </div>
          <button className="btn-pdf" onClick={()=>onPDF(selected)}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
            PDF
          </button>
        </div>
      </div>

      {/* Summary strip - per currency */}
      {(() => {
        const cMap = {};
        acctEntries.forEach(e => {
          const c = e.currency||"USD";
          if (!cMap[c]) cMap[c] = {bills:0, payments:0};
          if (e.type==="Bill") cMap[c].bills += e.amount;
          else cMap[c].payments += e.amount;
        });
        return Object.entries(cMap).map(([code, v], ci) => {
          const cBal = v.payments - v.bills;
          return (
            <div key={code} style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))", borderBottom:"1px solid #2a2a32", borderTop: ci>0?"1px solid #1e1e26":"none" }}>
              {[
                { label:"Bills",    value:v.bills,    color:"#f87171" },
                { label:"Payments", value:v.payments, color:"#4ade80" },
                { label:"Balance",  value:cBal,       color:cBal>=0?"#4ade80":"#f87171" },
              ].map((s, i) => (
                <div key={i} style={{ padding:"12px 20px", borderRight:i<2?"1px solid #2a2a32":"none", position:"relative" }}>
                  {i===0 && <span style={{position:"absolute",top:8,left:8,fontSize:9,color:"#5b5bf6",background:"#1e1e3a",border:"1px solid #3a3a5e",padding:"1px 5px",borderRadius:3,fontWeight:600}}>{code}</span>}
                  <div style={{ fontSize:10, color:"#555", letterSpacing:".07em", textTransform:"uppercase", marginBottom:3, marginTop: i===0?12:0 }}>{s.label}</div>
                  <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:16, color:s.color }}>{fmtC(s.value, code)}</div>
                </div>
              ))}
            </div>
          );
        });
      })()}

      {/* Table */}
      <div className="sheet-scroll" style={{ overflowX:"auto" }}>
        <div style={{ minWidth:900 }}>
          {/* Header */}
          <div style={{ display:"grid", gridTemplateColumns:"120px 130px 90px 150px 160px 170px 55px", padding:"10px 20px", background:"#12121a", borderBottom:"1px solid #2a2a32" }}>
            {["SUB. ID","DATE","TYPE","DETAILS","AMOUNT","BALANCE","DOCS"].map((h,i) => (
              <span key={i} style={{ fontSize:10, color: i===0?"#a5b4fc":i===1?"#f59e0b":"#555", letterSpacing:".08em", fontWeight:500 }}>{h}</span>
            ))}
          </div>
          {acctEntries.length === 0 && (
            <div style={{ padding:"30px", textAlign:"center", color:"#555", fontSize:13 }}>No transactions for {selected} yet.</div>
          )}
          {acctEntries.map((e, i) => {
            const cur = e.currency || "USD";
            if (!runningByCurrency[cur]) runningByCurrency[cur] = 0;
            runningByCurrency[cur] += e.type === "Payment" ? e.amount : -e.amount;
            const bal = runningByCurrency[cur];
            return (
              <div key={e.id} className="sheet-row" style={{ display:"grid", gridTemplateColumns:"120px 130px 90px 150px 160px 170px 55px", padding:"11px 20px", borderBottom:i<acctEntries.length-1?"1px solid #1e1e26":"none", alignItems:"center" }}>
                <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:600, color:"#a5b4fc", background:"#1a1a2e", border:"1px solid #3a3a5e", padding:"3px 7px", borderRadius:5, display:"inline-block" }}>{e.txnId||"—"}</span>
                <div>
                  {e.createdAt ? (
                    <>
                      <div style={{ fontSize:11, color:"#e8e6e1" }}>{new Date(e.createdAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}</div>
                      <div style={{ fontSize:10, color:"#555" }}>{new Date(e.createdAt).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</div>
                    </>
                  ) : <span style={{color:"#333",fontSize:11}}>—</span>}
                </div>
                <span className={`tag tag-${e.type.toLowerCase()}`}>{e.type}</span>
                <span style={{ fontSize:12, color:"#888", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.source || <span style={{color:"#333"}}>—</span>}</span>
                <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13, color:e.type==="Bill"?"#f87171":"#4ade80" }}>
                  {e.type==="Bill"?"-":"+"}{fmtC(e.amount, cur)}
                </span>
                <div>
                  <span className={bal>=0?"balance-pos":"balance-neg"} style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13 }}>{fmtC(bal, cur)}</span>
                  {cur !== "USD" && <span style={{ marginLeft:4, fontSize:9, color:"#5b5bf6", background:"#1e1e3a", border:"1px solid #3a3a5e", padding:"1px 4px", borderRadius:3 }}>{cur}</span>}
                </div>
                <div>
                  {e.docs&&e.docs.length>0
                    ? <span className="doc-badge" onClick={()=>setPreviewDocs({docs:e.docs,idx:0})} title="Click to view attachments">📎 {e.docs.length}</span>
                    : <span style={{color:"#333",fontSize:11}}>—</span>}
                </div>
              </div>
            );
          })}
          {acctEntries.length > 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"120px 130px 90px 150px 160px 170px 55px", padding:"12px 20px", borderTop:"1px solid #2a2a32", background:"#12121a" }}>
              <span/><span/><span/>
              <span style={{ fontSize:11, color:"#888", fontWeight:600 }}>TOTAL</span>
              <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:13, color:"#e8e6e1" }}>{fmt(bills+payments)}</span>
              <span className={balance>=0?"balance-pos":"balance-neg"} style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:13 }}>{fmt(balance)}</span>
              <span/>
            </div>
          )}
        </div>
      </div>
      {/* ── ATTACHMENT VIEWER MODAL ── */}
      {previewDocs && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setPreviewDocs(null)}>
          <div style={{background:"#16161b",border:"1px solid #2a2a32",borderRadius:14,overflow:"hidden",maxWidth:860,width:"100%",maxHeight:"90vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",borderBottom:"1px solid #2a2a32",flexShrink:0}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:16}}>📎</span>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:"#e8e6e1"}}>{previewDocs.docs[previewDocs.idx].name}</div>
                  <div style={{fontSize:10,color:"#555"}}>{previewDocs.idx+1} of {previewDocs.docs.length} attachment{previewDocs.docs.length>1?"s":""}</div>
                </div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {previewDocs.docs.length > 1 && (<>
                  <button onClick={()=>setPreviewDocs(p=>({...p,idx:Math.max(0,p.idx-1)}))} disabled={previewDocs.idx===0}
                    style={{background:"#1e1e26",border:"1px solid #2e2e3a",color:previewDocs.idx===0?"#333":"#888",padding:"6px 11px",borderRadius:6,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>◀</button>
                  <button onClick={()=>setPreviewDocs(p=>({...p,idx:Math.min(p.docs.length-1,p.idx+1)}))} disabled={previewDocs.idx===previewDocs.docs.length-1}
                    style={{background:"#1e1e26",border:"1px solid #2e2e3a",color:previewDocs.idx===previewDocs.docs.length-1?"#333":"#888",padding:"6px 11px",borderRadius:6,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>▶</button>
                </>)}
                <a href={previewDocs.docs[previewDocs.idx].dataUrl} download={previewDocs.docs[previewDocs.idx].name}
                  style={{background:"#1e1e2e",border:"1px solid #3a3a5e",color:"#a5b4fc",textDecoration:"none",padding:"6px 13px",borderRadius:6,fontSize:12,display:"flex",alignItems:"center",gap:5}}>
                  ⬇ Download
                </a>
                <button onClick={()=>setPreviewDocs(null)} style={{background:"#2d1a1a",border:"1px solid #5c2020",color:"#f87171",padding:"6px 11px",borderRadius:6,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
              </div>
            </div>
            {previewDocs.docs.length > 1 && (
              <div style={{display:"flex",gap:8,padding:"10px 18px",borderBottom:"1px solid #1e1e26",background:"#12121a",overflowX:"auto"}}>
                {previewDocs.docs.map((d,i)=>(
                  <div key={i} onClick={()=>setPreviewDocs(p=>({...p,idx:i}))}
                    style={{flexShrink:0,width:52,height:52,borderRadius:7,border:`2px solid ${i===previewDocs.idx?"#5b5bf6":"#2a2a32"}`,overflow:"hidden",cursor:"pointer",background:"#1e1e26",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {d.type.startsWith("image/") ? <img src={d.dataUrl} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{fontSize:20}}>📄</span>}
                  </div>
                ))}
              </div>
            )}
            <div style={{flex:1,overflow:"auto",padding:20,display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f11",minHeight:300}}>
              {previewDocs.docs[previewDocs.idx].type.startsWith("image/")
                ? <img src={previewDocs.docs[previewDocs.idx].dataUrl} alt={previewDocs.docs[previewDocs.idx].name} style={{maxWidth:"100%",maxHeight:"65vh",borderRadius:8,objectFit:"contain",boxShadow:"0 4px 32px rgba(0,0,0,.6)"}}/>
                : previewDocs.docs[previewDocs.idx].type==="application/pdf"
                  ? <iframe src={previewDocs.docs[previewDocs.idx].dataUrl} style={{width:"100%",height:"65vh",border:"none",borderRadius:8}} title={previewDocs.docs[previewDocs.idx].name}/>
                  : <div style={{textAlign:"center",color:"#555"}}>
                      <div style={{fontSize:48,marginBottom:12}}>📄</div>
                      <p>Preview not available — <a href={previewDocs.docs[previewDocs.idx].dataUrl} download={previewDocs.docs[previewDocs.idx].name} style={{color:"#a5b4fc"}}>Download to view</a></p>
                    </div>
              }
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [entries, setEntries]         = useState([]);
  const [people, setPeople]           = useState(DEFAULT_PEOPLE);
  const [dbLoading, setDbLoading]      = useState(true);
  const [entryByList, setEntryByList] = useState(DEFAULT_ENTRY_BY);
  const [form, setForm]               = useState({ name:"", type:"Bill", amount:"", source:"", entryBy:"", currency:"USD", docs:[] });
  const [errors, setErrors]           = useState({});
  const [submitted, setSubmitted]     = useState(false);
  const [editId, setEditId]           = useState(null);
  const [view, setView]               = useState("dashboard");
  const [showAddPerson, setShowAddPerson] = useState(false);
  const [newPersonName, setNewPersonName] = useState("");
  const [newPersonError, setNewPersonError] = useState("");
  const [filterName, setFilterName]   = useState("ALL");
  const [sheetSearch, setSheetSearch]  = useState("");
  const [showPdfModal, setShowPdfModal] = useState(false);
  const [authUser, setAuthUser]         = useState(null); // null = not logged in
  const [loginForm, setLoginForm]       = useState({ username:"", password:"" });
  const [loginError, setLoginError]     = useState("");


  // ── FIREBASE SYNC ──────────────────────────────────────────────────────────
  useEffect(() => {
    // Load people config
    peopleCol().get().then(doc => {
      if (doc.exists && doc.data().list) setPeople(doc.data().list);
    });
    entryByCol().get().then(doc => {
      if (doc.exists && doc.data().list) setEntryByList(doc.data().list);
    });
    // Real-time listener for entries
    const unsub = entriesCol().orderBy("createdAt", "asc").onSnapshot(snap => {
      const data = snap.docs.map(d => ({ ...d.data(), _fireId: d.id }));
      setEntries(data);
      setDbLoading(false);
    }, () => setDbLoading(false));
    return () => unsub();
  }, []);

  // Save people to Firebase whenever it changes
  useEffect(() => {
    if (!dbLoading) peopleCol().set({ list: people });
  }, [people]);

  // Save entryByList to Firebase whenever it changes
  useEffect(() => {
    if (!dbLoading) entryByCol().set({ list: entryByList });
  }, [entryByList]);

  const totals = useMemo(() => {
    const f = filterName === "ALL" ? entries : entries.filter(e => e.name === filterName);
    const bills = f.filter(e=>e.type==="Bill").reduce((s,e)=>s+e.amount,0);
    const payments = f.filter(e=>e.type==="Payment").reduce((s,e)=>s+e.amount,0);
    return { bills, payments, balance: payments - bills };
  }, [entries, filterName]);

  const perPersonStats = useMemo(() => people.map(p => {
    const bills    = entries.filter(e=>e.name===p&&e.type==="Bill").reduce((s,e)=>s+e.amount,0);
    const payments = entries.filter(e=>e.name===p&&e.type==="Payment").reduce((s,e)=>s+e.amount,0);
    // currency breakdown
    const currencies = {};
    entries.filter(e=>e.name===p).forEach(e => {
      const c = e.currency||"USD";
      if (!currencies[c]) currencies[c] = {bills:0,payments:0};
      if (e.type==="Bill") currencies[c].bills += e.amount;
      else currencies[c].payments += e.amount;
    });
    return { name:p, bills, payments, balance:payments-bills, currencies };
  }), [entries, people]);

  const validate = () => {
    const errs = {};
    if (!form.name) errs.name = "Select a name";
    if (!form.amount || isNaN(form.amount) || Number(form.amount) <= 0) errs.amount = "Enter a valid amount";
    if (!form.entryBy) errs.entryBy = "Select who prepared this entry";
    return errs;
  };

  const handleSubmit = () => {
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    const row = { name:form.name, type:form.type, amount:Number(form.amount), source:form.source.trim(), entryBy:form.entryBy, currency:form.currency||"USD", docs:form.docs };
    if (editId !== null) {
      // update in Firebase
      const entry = entries.find(e => e.id === editId);
      if (entry && entry._fireId) {
        entriesCol().doc(entry._fireId).update(row);
      }
      setEditId(null);
    } else {
      // add to Firebase
      const newEntry = { id: nextId++, txnId: makeTxnId(nextTxnNum++), createdAt: new Date().toISOString(), ...row };
      entriesCol().add(newEntry);
    }
    setForm({ name:people[0]||"", type:"Bill", amount:"", source:"", entryBy:entryByList[0]||"", docs:[] });
    setErrors({});
    setSubmitted(true);
    setTimeout(() => setSubmitted(false), 2200);
  };

  const handleEdit = (entry) => {
    setEditId(entry.id);
    setForm({ name:entry.name, type:entry.type, amount:String(entry.amount), source:entry.source||"", entryBy:entry.entryBy||"", currency:entry.currency||"USD", docs:entry.docs||[] });
    setView("form");
  };
  const handleDelete = (id) => {
    const entry = entries.find(e => e.id === id);
    if (entry && entry._fireId) entriesCol().doc(entry._fireId).delete();
  };
  const handleNew = () => { setEditId(null); setForm({ name:people[0]||"", type:"Bill", amount:"", source:"", entryBy:entryByList[0]||"", currency:"USD", docs:[] }); setErrors({}); setView("form"); };

  const handleAddPerson = () => {
    const t = newPersonName.trim().toUpperCase();
    if (!t) { setNewPersonError("Enter a name"); return; }
    if (people.includes(t)) { setNewPersonError("Already exists"); return; }
    setPeople(prev => [...prev, t]);
    setNewPersonName(""); setNewPersonError(""); setShowAddPerson(false);
  };

  const handleLogin = () => {
    const u = loginForm.username.trim().toUpperCase();
    const p = loginForm.password.trim();
    if (u === "ADMIN") {
      if (p === "azim@2026") { setAuthUser("ADMIN"); setLoginError(""); }
      else setLoginError("Wrong password for ADMIN.");
    } else if (u === "PARAGON") {
      setAuthUser("PARAGON"); setLoginError("");
    } else {
      setLoginError("Unknown username. Use ADMIN or PARAGON.");
    }
  };

  const avatarColor  = (name) => AVATAR_COLORS[people.indexOf(name) % AVATAR_COLORS.length];
  const ebColor      = (name) => EB_COLORS[entryByList.indexOf(name) % EB_COLORS.length];
  const filteredEntries = useMemo(() => {
    let res = filterName === "ALL" ? entries : entries.filter(e => e.name === filterName);
    if (sheetSearch.trim()) {
      const q = sheetSearch.trim().toLowerCase();
      res = res.filter(e =>
        (e.txnId && e.txnId.toLowerCase().includes(q)) ||
        e.name.toLowerCase().includes(q) ||
        (e.source && e.source.toLowerCase().includes(q)) ||
        (e.entryBy && e.entryBy.toLowerCase().includes(q))
      );
    }
    return res;
  }, [entries, filterName, sheetSearch]);

  if (dbLoading) return (
    <div style={{ fontFamily:"'DM Mono',monospace", minHeight:"100vh", background:"#0f0f11", color:"#e8e6e1", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
      <div style={{ width:44, height:44, border:"3px solid #2a2a32", borderTop:"3px solid #5b5bf6", borderRadius:"50%", animation:"spin 0.8s linear infinite" }}></div>
      <div style={{ color:"#555", fontSize:13 }}>Connecting to database…</div>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );

  if (!authUser) return (
    <div style={{ fontFamily:"'DM Mono',monospace", minHeight:"100vh", background:"#0f0f11", color:"#e8e6e1", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap'); *{box-sizing:border-box;margin:0;padding:0} input{outline:none}`}</style>
      <div style={{ width:"100%", maxWidth:400 }}>
        {/* Logo */}
        <div style={{ textAlign:"center", marginBottom:36 }}>
          <div style={{ width:60, height:60, background:"#5b5bf6", borderRadius:16, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px", boxShadow:"0 0 40px #5b5bf640" }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </div>
          <h1 style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:30, letterSpacing:"-.03em", marginBottom:4 }}>Paragon</h1>
          <p style={{ color:"#555", fontSize:13 }}>Account Management System</p>
        </div>

        {/* Card */}
        <div style={{ background:"#16161b", border:"1px solid #2a2a32", borderRadius:16, padding:32 }}>
          <p style={{ color:"#666", fontSize:12, marginBottom:20, textAlign:"center", letterSpacing:".04em" }}>SELECT YOUR ACCOUNT</p>

          {/* Two user buttons */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom: loginForm.username==="ADMIN" ? 20 : 0 }}>
            {/* PARAGON button */}
            <button
              onClick={()=>{ setLoginForm({username:"PARAGON",password:""}); setLoginError(""); setAuthUser("PARAGON"); }}
              style={{ padding:"20px 12px", borderRadius:12, border:`2px solid ${loginForm.username==="PARAGON"?"#10b981":"#2e2e3a"}`, background: loginForm.username==="PARAGON"?"#0d2d1e":"#1e1e26", cursor:"pointer", transition:"all .2s", textAlign:"center" }}
              onMouseEnter={e=>{ if(loginForm.username!=="PARAGON") e.currentTarget.style.borderColor="#10b98166"; }}
              onMouseLeave={e=>{ if(loginForm.username!=="PARAGON") e.currentTarget.style.borderColor="#2e2e3a"; }}
            >
              <div style={{ width:44, height:44, borderRadius:"50%", background:"#10b981", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 10px", fontSize:18, fontWeight:800, color:"#fff" }}>P</div>
              <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:14, color:"#10b981", marginBottom:4 }}>PARAGON</div>
              <div style={{ fontSize:10, color:"#555" }}>No password</div>
            </button>

            {/* ADMIN button */}
            <button
              onClick={()=>{ setLoginForm(f=>({...f, username:"ADMIN", password:""})); setLoginError(""); }}
              style={{ padding:"20px 12px", borderRadius:12, border:`2px solid ${loginForm.username==="ADMIN"?"#5b5bf6":"#2e2e3a"}`, background: loginForm.username==="ADMIN"?"#16162e":"#1e1e26", cursor:"pointer", transition:"all .2s", textAlign:"center" }}
              onMouseEnter={e=>{ if(loginForm.username!=="ADMIN") e.currentTarget.style.borderColor="#5b5bf666"; }}
              onMouseLeave={e=>{ if(loginForm.username!=="ADMIN") e.currentTarget.style.borderColor="#2e2e3a"; }}
            >
              <div style={{ width:44, height:44, borderRadius:"50%", background:"#5b5bf6", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 10px", fontSize:18, fontWeight:800, color:"#fff" }}>A</div>
              <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:14, color:"#a5b4fc", marginBottom:4 }}>ADMIN</div>
              <div style={{ fontSize:10, color:"#555" }}>Password required</div>
            </button>
          </div>

          {/* Password field — only show when ADMIN selected */}
          {loginForm.username === "ADMIN" && (
            <div>
              <label style={{ display:"block", fontSize:11, color:"#888", marginBottom:8, letterSpacing:".06em", textTransform:"uppercase" }}>Admin Password</label>
              <input
                type="password"
                value={loginForm.password}
                onChange={e=>{ setLoginForm(f=>({...f, password:e.target.value})); setLoginError(""); }}
                onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                placeholder="Enter password…"
                autoFocus
                style={{ width:"100%", background:"#1e1e26", border:`1px solid ${loginError?"#f87171":"#3a3a5e"}`, borderRadius:8, padding:"12px 14px", color:"#e8e6e1", fontSize:13, fontFamily:"'DM Mono',monospace", marginBottom:8 }}
                onFocus={e=>e.target.style.borderColor="#5b5bf6"}
                onBlur={e=>e.target.style.borderColor=loginError?"#f87171":"#3a3a5e"}
              />
              {loginError && <p style={{ color:"#f87171", fontSize:12, marginBottom:12 }}>{loginError}</p>}
              <button
                onClick={handleLogin}
                style={{ width:"100%", background:"#5b5bf6", border:"none", color:"#fff", fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:500, padding:"12px", borderRadius:8, cursor:"pointer" }}
                onMouseEnter={e=>e.currentTarget.style.background="#4a4ae0"}
                onMouseLeave={e=>e.currentTarget.style.background="#5b5bf6"}
              >
                🔐 Sign in as Admin →
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ fontFamily:"'DM Mono',monospace", minHeight:"100vh", background:"#0f0f11", color:"#e8e6e1" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#1a1a1e}::-webkit-scrollbar-thumb{background:#3a3a44;border-radius:4px}
        input{outline:none}
        .nav-btn{background:none;border:none;cursor:pointer;padding:8px 18px;border-radius:6px;font-family:'DM Mono',monospace;font-size:13px;color:#888;transition:all .2s}
        .nav-btn.active{background:#1e1e24;color:#e8e6e1}
        .nav-btn:hover:not(.active){color:#c8c6c1}
        .card{background:#16161b;border:1px solid #2a2a32;border-radius:12px;padding:24px}
        .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;letter-spacing:.04em}
        .tag-bill{background:#2d1a1a;color:#f87171;border:1px solid #3d2020}
        .tag-payment{background:#1a2d1a;color:#4ade80;border:1px solid #203d20}
        .input-field{width:100%;background:#1e1e26;border:1px solid #2e2e3a;border-radius:8px;padding:12px 14px;font-family:'DM Mono',monospace;font-size:14px;color:#e8e6e1;transition:border .2s}
        .input-field:focus{border-color:#5b5bf6}
        .input-field.error{border-color:#f87171}
        .btn-primary{background:#5b5bf6;border:none;color:#fff;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;padding:12px 28px;border-radius:8px;cursor:pointer;transition:background .2s,transform .1s}
        .btn-primary:hover{background:#4a4ae0}
        .btn-primary:active{transform:scale(.97)}
        .btn-ghost{background:none;border:1px solid #2e2e3a;color:#888;font-family:'DM Mono',monospace;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s}
        .btn-ghost:hover{border-color:#5b5bf6;color:#5b5bf6}
        .btn-danger{background:none;border:1px solid #3d2020;color:#f87171;font-family:'DM Mono',monospace;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s}
        .btn-danger:hover{background:#2d1a1a}
        .btn-pdf{background:#1a1a2e;border:1px solid #3a3a5e;color:#a5b4fc;font-family:'DM Mono',monospace;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
        .btn-pdf:hover{background:#22224a;border-color:#5b5bf6;color:#c7d2fe}
        .stat-card{background:#16161b;border:1px solid #2a2a32;border-radius:12px;padding:20px 24px}
        .balance-pos{color:#4ade80}
        .balance-neg{color:#f87171}
        .toast{position:fixed;bottom:32px;right:32px;background:#1e2d1e;border:1px solid #203d20;color:#4ade80;padding:12px 20px;border-radius:8px;font-size:13px;animation:slideUp .3s ease;z-index:999}
        @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .sheet-row:hover{background:#1a1a22}
        .sheet-row{transition:background .15s}
        .filter-chip{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #2a2a32;background:none;font-family:'DM Mono',monospace;color:#888;transition:all .2s}
        .filter-chip.active{background:#1e1e2e;border-color:#5b5bf6;color:#e8e6e1}
        .filter-chip:hover:not(.active){border-color:#3a3a42;color:#bbb}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000}
        .modal{background:#16161b;border:1px solid #2a2a32;border-radius:14px;padding:28px;width:420px;max-width:94vw}
        .pdf-card{border:2px solid #2a2a32;border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between}
        .pdf-card:hover{border-color:#5b5bf6;background:#1a1a2e}
        .doc-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:#1a1a2e;border:1px solid #3a3a5e;color:#a5b4fc;padding:2px 7px;border-radius:4px;cursor:pointer}
        .eb-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
        .sheet-scroll::-webkit-scrollbar{height:6px}
        .sheet-scroll::-webkit-scrollbar-track{background:#12121a;border-radius:3px}
        .sheet-scroll::-webkit-scrollbar-thumb{background:#3a3a5e;border-radius:3px}
        .sheet-scroll::-webkit-scrollbar-thumb:hover{background:#5b5bf6}

        /* ── RESPONSIVE ── */
        @media (max-width:768px){
          /* Header */
          .paragon-header { flex-wrap:wrap; height:auto !important; padding:10px 16px !important; gap:8px; }
          .paragon-logo { order:1; }
          .paragon-nav { order:3; width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:4px; }
          .paragon-nav::-webkit-scrollbar{display:none}
          .paragon-actions { order:2; }
          .nav-btn { padding:6px 12px !important; font-size:11px !important; white-space:nowrap; }
          /* Main content */
          .paragon-main { padding:16px 12px !important; }
          /* Dashboard title */
          .dash-header { flex-direction:column !important; align-items:flex-start !important; gap:10px; }
          /* Summary cards */
          .stat-card { padding:14px 16px !important; }
          /* Accounts table — scroll */
          .accounts-table-wrap { overflow-x:auto; }
          /* Modal */
          .modal { width:94vw !important; padding:20px !important; }
          /* Form */
          .form-wrap { max-width:100% !important; }
          /* PDF buttons in header */
          .btn-pdf span.pdf-label { display:none; }
          /* User pill in header */
          .user-pill-name { display:none; }
        }
        @media (max-width:480px){
          .paragon-main { padding:12px 8px !important; }
          .stat-card { padding:12px !important; }
          .stat-card .stat-val { font-size:16px !important; }
          .nav-btn { padding:5px 10px !important; font-size:10px !important; }
          /* Stack account table header info */
          .dash-header h1 { font-size:22px !important; }
          /* Modal full screen on small mobile */
          .modal { width:100vw !important; min-height:100vh; border-radius:0 !important; margin:0 !important; }
          .modal-overlay { align-items:flex-end !important; padding:0 !important; }
          /* PDF card */
          .pdf-card { padding:10px 12px !important; }
          /* Type buttons */
          .type-btn { font-size:11px !important; padding:10px 4px !important; }
          /* Currency buttons */
          .currency-btn { padding:8px 4px !important; }
        }
        /* Tablet */
        @media (min-width:481px) and (max-width:768px){
          .modal { width:90vw !important; }
        }
        @media (min-width:769px) and (max-width:1024px){
          .paragon-main { padding:24px 16px !important; }
        }
      `}</style>

      {/* ── HEADER ── */}
      <div className="paragon-header" style={{ borderBottom:"1px solid #1e1e26", padding:"0 40px", display:"flex", alignItems:"center", justifyContent:"space-between", height:56 }}>
        <div className="paragon-logo" style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:28, height:28, background:"#5b5bf6", borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </div>
          <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:16, letterSpacing:"-.02em" }}>Paragon</span>
        </div>
        <nav className="paragon-nav" style={{ display:"flex", gap:4 }}>
          {["dashboard","account","form","sheet"].filter(v => v !== "sheet" || authUser === "ADMIN").map(v => (
            <button key={v} className={`nav-btn ${view===v?"active":""}`} onClick={()=>setView(v)}>
