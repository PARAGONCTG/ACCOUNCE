      {/* Info banner */}
      <div style={{display:"flex",alignItems:"center",gap:10,background:"#141414",border:"1px solid #2a2a32",borderRadius:10,padding:"10px 16px",marginBottom:18,fontSize:12}}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#5b5bf6" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span style={{color:"#666"}}><strong style={{color:"#a5b4fc"}}>Read-only</strong> view for team members. Only the admin can approve or reject entries.</span>
      </div>

      {/* Empty state */}
      {filtered.length === 0 && (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"60px 20px",background:"#16161b",border:"1px solid #2a2a32",borderRadius:14,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:14}}>{statusFilter==="pending"?"🕐":statusFilter==="approved"?"✅":statusFilter==="rejected"?"✗":"📋"}</div>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:17,color:"#555",marginBottom:6}}>No {statusFilter==="all"?"":statusFilter} requests</div>
          <div style={{fontSize:12,color:"#444"}}>Nothing to show here yet.</div>
        </div>
      )}

      {/* Table */}
      {filtered.length > 0 && (
        <div style={{background:"#16161b",border:"1px solid #2a2a32",borderRadius:12,overflow:"hidden"}}>
          {/* Scrollable wrapper */}
          <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
          <div style={{minWidth:920}}>
          {/* Table header */}
          <div style={{display:"grid",gridTemplateColumns:"130px 120px 120px 130px 100px 130px 160px 150px 80px",padding:"11px 18px",background:"#12121a",borderBottom:"1px solid #2a2a32"}}>
            {["SUB. ID","STATUS","DATE","ACCOUNT","TYPE","AMOUNT","DETAILS","PREPARED BY","ACTION"].map((h,i)=>(
              <span key={i} style={{fontSize:10,color:i===0?"#a5b4fc":i===1?"#f59e0b":"#555",letterSpacing:".08em",fontWeight:600,textTransform:"uppercase"}}>{h}</span>
            ))}
          </div>
          {/* Rows */}
          {filtered.map((r, i) => {
            const pIdx = people.indexOf(r.name);
            const eIdx = entryByList.indexOf(r.entryBy);
            const aColor = AVATAR_COLORS[pIdx>=0?pIdx%AVATAR_COLORS.length:0];
            const eColor = EB_COLORS[eIdx>=0?eIdx%EB_COLORS.length:0];
            const rowBg = r.status==="approved" ? "#0a160f" : r.status==="rejected" ? "#160a0a" : "#0f0f11";
            const actionLabel = r.status==="approved"
              ? `Approved by ${r.approvedBy||"admin"} · ${r.approvedAt?new Date(r.approvedAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):""}`
              : r.status==="rejected"
              ? `Rejected by ${r.rejectedBy||"admin"} · ${r.rejectedAt?new Date(r.rejectedAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):""}`
              : null;
            return (
              <div key={r._fireId||i}>
                <div className="sheet-row" style={{display:"grid",gridTemplateColumns:"130px 120px 120px 130px 100px 130px 160px 150px 80px",padding:"12px 18px",borderBottom:"1px solid #1e1e26",alignItems:"center",background:rowBg}}>
                  <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,color:"#a5b4fc",background:"#1a1a2e",border:"1px solid #3a3a5e",padding:"3px 7px",borderRadius:5,display:"inline-block"}}>{r.txnId||"—"}</span>
                  <div><StatusBadge status={r.status}/></div>
                  <div style={{fontSize:11,color:"#888"}}>{r.submittedAt?new Date(r.submittedAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}):"—"}</div>
                  <div style={{display:"flex",alignItems:"center",gap:7}}>
                    <div style={{width:22,height:22,borderRadius:"50%",background:aColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:"#fff",flexShrink:0}}>{r.name?.[0]}</div>
                    <span style={{fontSize:12,fontWeight:600,color:aColor}}>{r.name}</span>
                  </div>
                  <span className="tag tag-bill" style={{fontSize:10}}>Bill</span>
                  <div>
                    <span style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:13,color:"#fb923c"}}>{fmtC(r.amount,r.currency||"USD")}</span>
                    {r.currency&&r.currency!=="USD"&&<div style={{fontSize:9,color:"#5b5bf6",background:"#1e1e3a",border:"1px solid #3a3a5e",padding:"1px 4px",borderRadius:3,marginTop:2,display:"inline-block",marginLeft:4}}>{r.currency}</div>}
                  </div>
                  <span style={{fontSize:11,color:"#777",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.source||<span style={{color:"#333"}}>—</span>}</span>
                  {r.entryBy?(
                    <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 8px",borderRadius:20,fontSize:11,fontWeight:500,background:`${eColor}15`,border:`1px solid ${eColor}35`,color:eColor}}>
                      <span style={{width:14,height:14,borderRadius:"50%",background:eColor,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#0f0f11",fontWeight:900}}>{r.entryBy[0]}</span>
                      {r.entryBy}
                    </span>
                  ):<span style={{color:"#333",fontSize:11}}>—</span>}
                  {/* Per-row clear button — only for approved/rejected history entries */}
                  <div>
                    {r.status !== "pending" ? (
                      <button onClick={()=>handleClearOne(r)}
                        title="Remove this entry from history"
                        style={{display:"inline-flex",alignItems:"center",gap:5,background:"#2a0f0f",border:"1px solid #5c1a1a",color:"#fb923c",fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:600,padding:"5px 10px",borderRadius:6,cursor:"pointer",whiteSpace:"nowrap"}}>
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14a2,2,0,0,1-2,2H8a2,2,0,0,1-2-2L5,6"/><path d="M10,11v6M14,11v6"/></svg>
                        Clear
                      </button>
                    ) : (
                      <span style={{fontSize:10,color:"#333"}}>—</span>
                    )}
                  </div>
                </div>
                {actionLabel&&(
                  <div style={{padding:"4px 18px 7px",background:rowBg,borderBottom:"1px solid #1e1e26",display:"flex",alignItems:"center",gap:6}}>
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke={r.status==="approved"?"#34d399":"#fb923c"} strokeWidth="2">
                      {r.status==="approved"?<polyline points="20,6 9,17 4,12"/>:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}
                    </svg>
                    <span style={{fontSize:10,color:r.status==="approved"?"#34d399":"#fb923c",opacity:.75}}>{actionLabel}</span>
                  </div>
                )}
              </div>
            );
          })}
          </div>
          </div>
        </div>
      )}

      {/* Summary footer */}
      {filtered.length > 0 && (
        <div style={{marginTop:14,display:"flex",alignItems:"center",gap:16,flexWrap:"wrap",padding:"12px 16px",background:"#12121a",border:"1px solid #2a2a32",borderRadius:10}}>
          <span style={{fontSize:11,color:"#555",textTransform:"uppercase",letterSpacing:".06em"}}>Showing</span>
          <span style={{fontSize:13,color:"#888"}}><strong style={{color:"#e8e6e1"}}>{filtered.length}</strong> request{filtered.length!==1?"s":""}</span>
          <div style={{width:1,height:16,background:"#2a2a32"}}/>
          <span style={{fontSize:12,color:"#f59e0b"}}>🕐 {pendingCount} pending</span>
          <span style={{fontSize:12,color:"#34d399"}}>✅ {approvedCount} approved</span>
          <span style={{fontSize:12,color:"#fb923c"}}>✗ {rejectedCount} rejected</span>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#333"}}>
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#444" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            View only
          </div>
        </div>
      )}
    </div>
  );
}


// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App() {
  const [entries, setEntries]         = useState([]);
  const [pendingEntries, setPendingEntries] = useState([]);
  const [requestHistory, setRequestHistory] = useState([]);
  const [people, setPeople]           = useState(DEFAULT_PEOPLE);
  const [dbLoading, setDbLoading]      = useState(true);
  const [entryByList, setEntryByList] = useState(DEFAULT_ENTRY_BY);
  const [form, setForm]               = useState({ name:"", type:"Bill", amount:"", source:"", entryBy:"", currency:"USD", docs:[], txDate: new Date().toISOString().slice(0,10) });
  const [errors, setErrors]           = useState({});
  const [submitted, setSubmitted]     = useState(false);
  const [submittedPending, setSubmittedPending] = useState(false);
  const [editId, setEditId]           = useState(null);
  const [view, setView]               = useState("dashboard");
  const [showAddPerson, setShowAddPerson] = useState(false);
  const [newPersonName, setNewPersonName] = useState("");
  const [newPersonError, setNewPersonError] = useState("");
  const [filterName, setFilterName]   = useState("ALL");
  const [sheetSearch, setSheetSearch]  = useState("");
  const [showPdfModal, setShowPdfModal] = useState(false);
  const [authUser, setAuthUser]         = useState(null); // null = not logged in
  const [loginForm, setLoginForm]       = useState({ username:"", password:"" });
  const [loginError, setLoginError]     = useState("");


  // ── FIREBASE SYNC ──────────────────────────────────────────────────────────
  useEffect(() => {
    // Load people config
    peopleCol().get().then(doc => {
      if (doc.exists && doc.data().list) setPeople(doc.data().list);
    });
    entryByCol().get().then(doc => {
      if (doc.exists && doc.data().list) setEntryByList(doc.data().list);
    });
    // Real-time listener for entries
    const unsub = entriesCol().orderBy("createdAt", "asc").onSnapshot(snap => {
      const data = snap.docs.map(d => ({ ...d.data(), _fireId: d.id }));
      setEntries(data);
      setDbLoading(false);
    }, () => setDbLoading(false));
    // Real-time listener for pending entries
    const unsubPending = pendingCol().orderBy("submittedAt", "asc").onSnapshot(snap => {
      const data = snap.docs.map(d => ({ ...d.data(), _fireId: d.id }));
      setPendingEntries(data);
    }, () => {});
    // Real-time listener for request history (approved/rejected)
    const unsubHistory = historyCol().orderBy("submittedAt", "desc").onSnapshot(snap => {
      const data = snap.docs.map(d => ({ ...d.data(), _fireId: d.id }));
      setRequestHistory(data);
    }, () => {});
    return () => { unsub(); unsubPending(); unsubHistory(); };
  }, []);

  // Save people to Firebase whenever it changes
  useEffect(() => {
    if (!dbLoading) peopleCol().set({ list: people });
  }, [people]);

  // Save entryByList to Firebase whenever it changes
  useEffect(() => {
    if (!dbLoading) entryByCol().set({ list: entryByList });
  }, [entryByList]);

  const totals = useMemo(() => {
    const f = filterName === "ALL" ? entries : entries.filter(e => e.name === filterName);
    const bills = f.filter(e=>e.type==="Bill").reduce((s,e)=>s+e.amount,0);
    const payments = f.filter(e=>e.type==="Payment").reduce((s,e)=>s+e.amount,0);
    return { bills, payments, balance: payments - bills };
  }, [entries, filterName]);

  const perPersonStats = useMemo(() => people.map(p => {
    const bills    = entries.filter(e=>e.name===p&&e.type==="Bill").reduce((s,e)=>s+e.amount,0);
    const payments = entries.filter(e=>e.name===p&&e.type==="Payment").reduce((s,e)=>s+e.amount,0);
    // currency breakdown
    const currencies = {};
    entries.filter(e=>e.name===p).forEach(e => {
      const c = e.currency||"USD";
      if (!currencies[c]) currencies[c] = {bills:0,payments:0};
      if (e.type==="Bill") currencies[c].bills += e.amount;
      else currencies[c].payments += e.amount;
    });
    return { name:p, bills, payments, balance:payments-bills, currencies };
  }), [entries, people]);

  const validate = () => {
    const errs = {};
    if (!form.name) errs.name = "Select a name";
    if (!form.amount || isNaN(form.amount) || Number(form.amount) <= 0) errs.amount = "Enter a valid amount";
    if (!form.entryBy) errs.entryBy = "Select who prepared this entry";
    return errs;
  };

  const handleSubmit = () => {
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    const row = { name:form.name, type:form.type, amount:Number(form.amount), source:form.source.trim(), entryBy:form.entryBy, currency:form.currency||"USD", docs:form.docs, createdAt: form.txDate ? form.txDate + "T00:00:00" : new Date().toISOString() };
    if (editId !== null) {
      // update in Firebase
      const entry = entries.find(e => e.id === editId);
      if (entry && entry._fireId) {
        entriesCol().doc(entry._fireId).update(row);
      }
      setEditId(null);
    } else {
      if (form.type === "Bill") {
        // Bill → goes to pending queue for admin approval
        const pendingEntry = { ...row, id: nextId++, txnId: makeTxnId(nextTxnNum++), status:"pending", submittedAt: new Date().toISOString() };
        pendingCol().add(pendingEntry);
        setForm({ name:people[0]||"", type:"Bill", amount:"", source:"", entryBy:entryByList[0]||"", currency:"USD", docs:[], txDate: new Date().toISOString().slice(0,10) });
        setErrors({});
        setSubmittedPending(true);
        setTimeout(() => setSubmittedPending(false), 3000);
        return;
      } else {
        // Payment → goes directly to entries
        const newEntry = { id: nextId++, txnId: makeTxnId(nextTxnNum++), ...row };
        entriesCol().add(newEntry);
      }
    }
    setForm({ name:people[0]||"", type:"Bill", amount:"", source:"", entryBy:entryByList[0]||"", currency:"USD", docs:[], txDate: new Date().toISOString().slice(0,10) });
    setErrors({});
    setSubmitted(true);
    setTimeout(() => setSubmitted(false), 2200);
  };

  const handleEdit = (entry) => {
    setEditId(entry.id);
    setForm({ name:entry.name, type:entry.type, amount:String(entry.amount), source:entry.source||"", entryBy:entry.entryBy||"", currency:entry.currency||"USD", docs:entry.docs||[], txDate: entry.createdAt ? entry.createdAt.slice(0,10) : new Date().toISOString().slice(0,10) });
    setView("form");
  };
  const handleDelete = (id) => {
    const entry = entries.find(e => e.id === id);
    if (entry && entry._fireId) entriesCol().doc(entry._fireId).delete();
  };

  const handleApprove = (pending) => {
    if (!pending._fireId) return;
    const { _fireId, status, submittedAt, ...entryData } = pending;
    const approvedAt = new Date().toISOString();
    // Move to live entries
    entriesCol().add({ ...entryData, approvedAt, approvedBy: authUser });
    // Write to history
    historyCol().add({ ...pending, status:"approved", approvedAt, approvedBy: authUser });
    // Remove from pending
    pendingCol().doc(_fireId).delete();
  };

  const handleReject = (pending) => {
    if (!pending._fireId) return;
    const rejectedAt = new Date().toISOString();
    // Write to history
    historyCol().add({ ...pending, status:"rejected", rejectedAt, rejectedBy: authUser });
    // Remove from pending
    pendingCol().doc(pending._fireId).delete();
  };

  const handleClearHistory = () => {
    requestHistory.forEach(r => { if (r._fireId) historyCol().doc(r._fireId).delete(); });
  };

  const handleClearOne = (record) => {
    if (record._fireId) historyCol().doc(record._fireId).delete();
  };
  const handleNew = () => { setEditId(null); setForm({ name:people[0]||"", type:"Bill", amount:"", source:"", entryBy:entryByList[0]||"", currency:"USD", docs:[], txDate: new Date().toISOString().slice(0,10) }); setErrors({}); setView("form"); };

  const handleAddPerson = () => {
    const t = newPersonName.trim().toUpperCase();
    if (!t) { setNewPersonError("Enter a name"); return; }
    if (people.includes(t)) { setNewPersonError("Already exists"); return; }
    setPeople(prev => [...prev, t]);
    setNewPersonName(""); setNewPersonError(""); setShowAddPerson(false);
  };

  const handleLogin = () => {
    const u = loginForm.username.trim().toUpperCase();
    const p = loginForm.password.trim();
    if (u === "ADMIN") {
      if (p === "azim@2026") { setAuthUser("ADMIN"); setLoginError(""); }
      else setLoginError("Wrong password for ADMIN.");
    } else if (u === "PARAGON") {
      setAuthUser("PARAGON"); setLoginError("");
    } else {
      setLoginError("Unknown username. Use ADMIN or PARAGON.");
    }
  };

  const avatarColor  = (name) => AVATAR_COLORS[people.indexOf(name) % AVATAR_COLORS.length];
  const ebColor      = (name) => EB_COLORS[entryByList.indexOf(name) % EB_COLORS.length];
  const filteredEntries = useMemo(() => {
    let res = filterName === "ALL" ? entries : entries.filter(e => e.name === filterName);
    if (sheetSearch.trim()) {
      const q = sheetSearch.trim().toLowerCase();
      res = res.filter(e =>
        (e.txnId && e.txnId.toLowerCase().includes(q)) ||
        e.name.toLowerCase().includes(q) ||
        (e.source && e.source.toLowerCase().includes(q)) ||
        (e.entryBy && e.entryBy.toLowerCase().includes(q))
      );
    }
    return res;
  }, [entries, filterName, sheetSearch]);

  if (dbLoading) return (
    <div style={{ fontFamily:"'DM Mono',monospace", minHeight:"100vh", background:"#0f0f11", color:"#e8e6e1", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
      <div style={{ width:44, height:44, border:"3px solid #2a2a32", borderTop:"3px solid #5b5bf6", borderRadius:"50%", animation:"spin 0.8s linear infinite" }}></div>
      <div style={{ color:"#555", fontSize:13 }}>Connecting to database…</div>
      <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
    </div>
  );

  if (!authUser) return (
    <div style={{ fontFamily:"'DM Mono',monospace", minHeight:"100vh", background:"#0f0f11", color:"#e8e6e1", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap'); *{box-sizing:border-box;margin:0;padding:0} input{outline:none}`}</style>
      <div style={{ width:"100%", maxWidth:400 }}>
        {/* Logo */}
        <div style={{ textAlign:"center", marginBottom:36 }}>
          <div style={{ width:60, height:60, background:"#5b5bf6", borderRadius:16, display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 16px", boxShadow:"0 0 40px #5b5bf640" }}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </div>
          <h1 style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:30, letterSpacing:"-.03em", marginBottom:4 }}>Paragon</h1>
          <p style={{ color:"#555", fontSize:13 }}>Account Management System</p>
        </div>

        {/* Card */}
        <div style={{ background:"#16161b", border:"1px solid #2a2a32", borderRadius:16, padding:32 }}>
          <p style={{ color:"#666", fontSize:12, marginBottom:20, textAlign:"center", letterSpacing:".04em" }}>SELECT YOUR ACCOUNT</p>

          {/* Two user buttons */}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom: loginForm.username==="ADMIN" ? 20 : 0 }}>
            {/* PARAGON button */}
            <button
              onClick={()=>{ setLoginForm({username:"PARAGON",password:""}); setLoginError(""); setAuthUser("PARAGON"); }}
              style={{ padding:"20px 12px", borderRadius:12, border:`2px solid ${loginForm.username==="PARAGON"?"#10b981":"#2e2e3a"}`, background: loginForm.username==="PARAGON"?"#0d2d1e":"#1e1e26", cursor:"pointer", transition:"all .2s", textAlign:"center" }}
              onMouseEnter={e=>{ if(loginForm.username!=="PARAGON") e.currentTarget.style.borderColor="#10b98166"; }}
              onMouseLeave={e=>{ if(loginForm.username!=="PARAGON") e.currentTarget.style.borderColor="#2e2e3a"; }}
            >
              <div style={{ width:44, height:44, borderRadius:"50%", background:"#10b981", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 10px", fontSize:18, fontWeight:800, color:"#fff" }}>P</div>
              <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:14, color:"#10b981", marginBottom:4 }}>PARAGON</div>
              <div style={{ fontSize:10, color:"#555" }}>No password</div>
            </button>

            {/* ADMIN button */}
            <button
              onClick={()=>{ setLoginForm(f=>({...f, username:"ADMIN", password:""})); setLoginError(""); }}
              style={{ padding:"20px 12px", borderRadius:12, border:`2px solid ${loginForm.username==="ADMIN"?"#5b5bf6":"#2e2e3a"}`, background: loginForm.username==="ADMIN"?"#16162e":"#1e1e26", cursor:"pointer", transition:"all .2s", textAlign:"center" }}
              onMouseEnter={e=>{ if(loginForm.username!=="ADMIN") e.currentTarget.style.borderColor="#5b5bf666"; }}
              onMouseLeave={e=>{ if(loginForm.username!=="ADMIN") e.currentTarget.style.borderColor="#2e2e3a"; }}
            >
              <div style={{ width:44, height:44, borderRadius:"50%", background:"#5b5bf6", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 10px", fontSize:18, fontWeight:800, color:"#fff" }}>A</div>
              <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:14, color:"#a5b4fc", marginBottom:4 }}>ADMIN</div>
              <div style={{ fontSize:10, color:"#555" }}>Password required</div>
            </button>
          </div>

          {/* Password field — only show when ADMIN selected */}
          {loginForm.username === "ADMIN" && (
            <div>
              <label style={{ display:"block", fontSize:11, color:"#888", marginBottom:8, letterSpacing:".06em", textTransform:"uppercase" }}>Admin Password</label>
              <input
                type="password"
                value={loginForm.password}
                onChange={e=>{ setLoginForm(f=>({...f, password:e.target.value})); setLoginError(""); }}
                onKeyDown={e=>e.key==="Enter"&&handleLogin()}
                placeholder="Enter password…"
                autoFocus
                style={{ width:"100%", background:"#1e1e26", border:`1px solid ${loginError?"#fb923c":"#3a3a5e"}`, borderRadius:8, padding:"12px 14px", color:"#e8e6e1", fontSize:13, fontFamily:"'DM Mono',monospace", marginBottom:8 }}
                onFocus={e=>e.target.style.borderColor="#5b5bf6"}
                onBlur={e=>e.target.style.borderColor=loginError?"#fb923c":"#3a3a5e"}
              />
              {loginError && <p style={{ color:"#fb923c", fontSize:12, marginBottom:12 }}>{loginError}</p>}
              <button
                onClick={handleLogin}
                style={{ width:"100%", background:"#5b5bf6", border:"none", color:"#fff", fontFamily:"'DM Mono',monospace", fontSize:13, fontWeight:500, padding:"12px", borderRadius:8, cursor:"pointer" }}
                onMouseEnter={e=>e.currentTarget.style.background="#4a4ae0"}
                onMouseLeave={e=>e.currentTarget.style.background="#5b5bf6"}
              >
                🔐 Sign in as Admin →
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ fontFamily:"'DM Mono',monospace", height:"100vh", display:"flex", flexDirection:"column", background:"#0f0f11", color:"#e8e6e1", overflow:"hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
        *{box-sizing:border-box;margin:0;padding:0}
        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#1a1a1e}::-webkit-scrollbar-thumb{background:#3a3a44;border-radius:4px}

        .nav-btn{background:none;border:none;cursor:pointer;padding:8px 18px;border-radius:6px;font-family:'DM Mono',monospace;font-size:13px;color:#888;transition:all .2s}

        .tag-bill{background:#2d1e0f;color:#fb923c;border:1px solid #7c3a10}
        .tag-payment{background:#0a2420;color:#34d399;border:1px solid #0f4a3a}
        .input-field{width:100%;background:#1e1e26;border:1px solid #2e2e3a;border-radius:8px;padding:9px 12px;font-family:'DM Mono',monospace;font-size:13px;color:#e8e6e1;transition:border .2s}
        .input-field:focus{border-color:#5b5bf6}
        .input-field.error{border-color:#fb923c}
        .btn-primary{background:#5b5bf6;border:none;color:#fff;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;padding:12px 28px;border-radius:8px;cursor:pointer;transition:background .2s,transform .1s}
        .btn-primary:hover{background:#4a4ae0}
        .btn-primary:active{transform:scale(.97)}
        .btn-ghost{background:none;border:1px solid #2e2e3a;color:#888;font-family:'DM Mono',monospace;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s}
        .btn-ghost:hover{border-color:#5b5bf6;color:#5b5bf6}
        .btn-danger{background:none;border:1px solid #6b3a10;color:#fb923c;font-family:'DM Mono',monospace;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s}
        .btn-danger:hover{background:#2d1a1a}
        .btn-pdf{background:#1a1a2e;border:1px solid #3a3a5e;color:#a5b4fc;font-family:'DM Mono',monospace;font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
        .btn-pdf:hover{background:#22224a;border-color:#5b5bf6;color:#c7d2fe}
        .stat-card{background:#16161b;border:1px solid #2a2a32;border-radius:12px;padding:20px 24px}
        .balance-pos{color:#34d399}
        .balance-neg{color:#fb923c}
        .toast{position:fixed;bottom:32px;right:32px;background:#0a2420;border:1px solid #0f4a3a;color:#34d399;padding:12px 20px;border-radius:8px;font-size:13px;animation:slideUp .3s ease;z-index:999}
        @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .sheet-row:hover{background:#1a1a22}
        .sheet-row{transition:background .15s}
        .filter-chip{padding:5px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid #2a2a32;background:none;font-family:'DM Mono',monospace;color:#888;transition:all .2s}
        .filter-chip.active{background:#1e1e2e;border-color:#5b5bf6;color:#e8e6e1}
        .filter-chip:hover:not(.active){border-color:#3a3a42;color:#bbb}
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000}
        .modal{background:#16161b;border:1px solid #2a2a32;border-radius:14px;padding:28px;width:420px;max-width:94vw}
        .pdf-card{border:2px solid #2a2a32;border-radius:10px;padding:14px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between}
        .pdf-card:hover{border-color:#5b5bf6;background:#1a1a2e}
        .doc-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;background:#1a1a2e;border:1px solid #3a3a5e;color:#a5b4fc;padding:2px 7px;border-radius:4px;cursor:pointer}
        .eb-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
        .sheet-scroll::-webkit-scrollbar{height:6px}
        .sheet-scroll::-webkit-scrollbar-track{background:#12121a;border-radius:3px}
        .sheet-scroll::-webkit-scrollbar-thumb{background:#3a3a5e;border-radius:3px}
        .sheet-scroll::-webkit-scrollbar-thumb:hover{background:#5b5bf6}

        /* ── RESPONSIVE ── */
        @media (max-width:768px){
          /* Header - 2 rows: top=logo+actions, bottom=nav */
          .paragon-header { flex-wrap:wrap; height:auto !important; padding:8px 12px 0 12px !important; gap:0; align-items:center; }
          .paragon-logo { order:1; flex:1; }
          .paragon-actions { order:2; display:flex; align-items:center; gap:5px !important; flex-shrink:0; }
          .paragon-nav { order:3; width:100%; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:6px 0 8px 0; border-top:1px solid #1e1e26; margin-top:8px; }
          .paragon-nav::-webkit-scrollbar{display:none}
          .nav-btn { padding:6px 12px !important; font-size:11px !important; white-space:nowrap; }
          /* Hide PDF label text on mobile, keep icon */
          .btn-pdf { padding:7px 10px !important; font-size:11px !important; }
          /* New Entry button smaller */
          .btn-primary { padding:7px 10px !important; font-size:11px !important; }
          /* Main content */
          .paragon-main { padding:12px 10px !important; }
          /* Dashboard title */
          .dash-header { flex-direction:column !important; align-items:flex-start !important; gap:8px; }
          /* Summary cards - stack on mobile */
          .stat-card { padding:12px 14px !important; }
          /* Accounts table — horizontal scroll */
          .accounts-table-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
          .accounts-table-wrap > div { min-width:600px; }
          /* Sheet scroll */
          .sheet-scroll { overflow-x:auto !important; -webkit-overflow-scrolling:touch; }
          .sheet-scroll > div { min-width:900px !important; }
          /* Modal */
          .modal { width:96vw !important; max-width:96vw !important; padding:16px !important; margin:8px !important; }
          /* Form */
          .form-wrap { max-width:100% !important; padding:0 !important; }
          /* PDF buttons in header */
          .btn-pdf span.pdf-label { display:none; }

          /* Home table rows - fix overflow */
          .home-account-row { font-size:11px !important; }
          /* Summary stats grid - 1 col on very small */
          .summary-cards { grid-template-columns:1fr !important; }
        }
        @media (max-width:480px){
          .paragon-main { padding:10px 8px !important; }
          .stat-card { padding:10px 12px !important; font-size:12px !important; }
          .nav-btn { padding:5px 8px !important; font-size:10px !important; }
          .accounts-table-wrap > div { min-width:560px !important; }
          /* Account detail back bar */
          .acct-back-bar { flex-direction:column !important; align-items:flex-start !important; gap:8px !important; }
          .acct-back-bar .search-wrap { width:100% !important; }
          /* Hide username text on very small screens */
          .user-pill-name { display:none !important; }
          /* Compact buttons */
          .btn-pdf { font-size:0 !important; padding:7px 9px !important; }
          .btn-pdf svg { display:inline-block !important; }
        }
        @media (max-width:480px){
          .paragon-main { padding:12px 8px !important; }
          .stat-card { padding:12px !important; }
          .stat-card .stat-val { font-size:16px !important; }
          .nav-btn { padding:5px 10px !important; font-size:10px !important; }
          /* Stack account table header info */
          .dash-header h1 { font-size:22px !important; }
          /* Modal full screen on small mobile */
          .modal { width:100vw !important; min-height:100vh; border-radius:0 !important; margin:0 !important; }
          .modal-overlay { align-items:flex-end !important; padding:0 !important; }
          /* PDF card */
          .pdf-card { padding:10px 12px !important; }
          /* Type buttons */
          .type-btn { font-size:11px !important; padding:10px 4px !important; }
          /* Currency buttons */
          .currency-btn { padding:8px 4px !important; }
        }
        /* Tablet */
        @media (min-width:481px) and (max-width:768px){
          .modal { width:90vw !important; }
        }
        @media (min-width:769px) and (max-width:1024px){
          .paragon-main { padding:24px 16px !important; }
        }
      `}</style>

      {/* ── HEADER ── */}
      <div className="paragon-header" style={{ borderBottom:"1px solid #1e1e26", padding:"0 24px", display:"flex", alignItems:"center", justifyContent:"space-between", minHeight:56, flexWrap:"wrap", gap:0 }}>
        <div className="paragon-logo" style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ width:28, height:28, background:"#5b5bf6", borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center" }}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
          </div>
          <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:17, letterSpacing:"-.02em", color:"#fff" }}>Paragon</span>
        </div>
        <nav className="paragon-nav" style={{ display:"flex", gap:4 }}>
          {["dashboard","account","form","pending","sheet"].filter(v => v !== "sheet" || authUser === "ADMIN").map(v => (
            <button key={v} className={`nav-btn ${view===v?"active":""}`} onClick={()=>setView(v)}>
              {v==="dashboard"?"🏠 Home":v==="account"?"👤 Account":v==="form"?"✏️ Entry":
               v==="pending"?(
                <span style={{display:"flex",alignItems:"center",gap:6}}>
                  📋 Status
                  {pendingEntries.length>0&&<span style={{background:"#f59e0b",color:"#0f0f11",borderRadius:"50%",width:16,height:16,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,lineHeight:1}}>{pendingEntries.length}</span>}
                </span>
               ):(
                <span style={{display:"flex",alignItems:"center",gap:6}}>
                  ⚙️ Admin
                  {pendingEntries.length>0&&<span style={{background:"#f59e0b",color:"#0f0f11",borderRadius:"50%",width:16,height:16,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,lineHeight:1}}>{pendingEntries.length}</span>}
                </span>
               )
              }
            </button>
          ))}
        </nav>
        <div className="paragon-actions" style={{ display:"flex", gap:8, alignItems:"center" }}>
          <button className="btn-pdf" onClick={()=>setShowPdfModal(true)}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
            PDF Report
          </button>
          <button className="btn-primary" style={{ padding:"8px 18px", fontSize:12 }} onClick={handleNew}>+ New Entry</button>
          <div style={{ display:"flex", alignItems:"center", gap:8, background:"#1e1e26", border:"1px solid #2e2e3a", borderRadius:8, padding:"6px 12px", whiteSpace:"nowrap", flexShrink:0 }}>
            <div style={{ width:22, height:22, borderRadius:"50%", background: authUser==="ADMIN"?"#5b5bf6":"#10b981", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:800, color:"#fff", flexShrink:0 }}>{authUser?.[0]}</div>
            <span className="user-pill-name" style={{ fontSize:12, color:"#888", whiteSpace:"nowrap", overflow:"hidden", maxWidth:80, textOverflow:"ellipsis" }}>{authUser}</span>
            <button onClick={()=>{setAuthUser(null);setLoginForm({username:"",password:""});setLoginError("");}} style={{ background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:18, lineHeight:1, padding:"0 0 0 4px" }}>×</button>
          </div>
        </div>
      </div>

      <div className="paragon-main" style={{ maxWidth:1400, width:"100%", margin:"0 auto", padding:"18px 32px", flex:1, overflowY:"auto" }}>

        {/* ── DASHBOARD ── */}
        {view==="dashboard" && (
          <DashboardView
            entries={entries} people={people} perPersonStats={perPersonStats}
            avatarColor={avatarColor} fmt={fmt} ebColor={ebColor}
            onAddPerson={()=>setShowAddPerson(true)}
            onPDF={(name)=>generatePDF(name,entries,people)}
            onViewSheet={()=>setView("sheet")}
            onNewEntry={handleNew}
          />
        )}

        {/* ── ACCOUNT DETAIL ── */}
        {view==="account" && (
          <AccountDetail entries={entries} people={people} avatarColor={avatarColor} fmt={fmt} ebColor={ebColor} onPDF={(name)=>generatePDF(name,entries,people)} />
        )}

        {/* ── PENDING REQUESTS (read-only for all team members) ── */}
        {view==="pending" && (
          <RequestHistoryView
            pendingEntries={pendingEntries}
            requestHistory={requestHistory}
            people={people}
            entryByList={entryByList}
            handleClearHistory={handleClearHistory}
            handleClearOne={handleClearOne}
          />
        )}

        {/* ── FORM ── */}
        {view==="form" && (
          <div className="form-wrap" style={{ maxWidth:540, margin:"0 auto" }}>
            <div style={{ marginBottom:14 }}>
              <div style={{display:"flex", alignItems:"center", gap:10, marginBottom:2}}>
                <h1 style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:22, letterSpacing:"-.03em" }}>{editId!==null?"Edit Entry":"Paragon"}</h1>
                {editId!==null && (() => { const e = entries.find(x=>x.id===editId); return e?.txnId ? <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:600,color:"#a5b4fc",background:"#1a1a2e",border:"1px solid #3a3a5e",padding:"3px 8px",borderRadius:6}}>{e.txnId}</span> : null; })()}
              </div>
              <p style={{ color:"#555", fontSize:12 }}>Account of Paragon — fill in all details</p>
            </div>
            <div className="card" style={{ display:"flex", flexDirection:"column", gap:12, padding:"16px" }}>

              {/* 1. Prepared By */}
              <div>
                <DropdownSelect
                  label="Prepared By"
                  value={form.entryBy}
                  options={entryByList}
                  placeholder="Select who prepared this entry…"
                  onChange={v=>{setForm(f=>({...f,entryBy:v}));setErrors(er=>({...er,entryBy:""}));}}
                  onAddNew={name=>setEntryByList(prev=>[...prev,name])}
                />
                {errors.entryBy&&<p style={{ color:"#fb923c", fontSize:11, marginTop:4 }}>{errors.entryBy}</p>}
              </div>

              {/* 2. Account Name */}
              <div>
                <DropdownSelect
                  label="Account Name"
                  value={form.name}
                  options={people}
                  colors={AVATAR_COLORS}
                  placeholder="Select account name…"
                  searchable={true}
                  onChange={v=>{setForm(f=>({...f,name:v}));setErrors(er=>({...er,name:""}));}}
                  onAddNew={name=>setPeople(prev=>[...prev,name])}
                />
                {errors.name&&<p style={{ color:"#fb923c", fontSize:11, marginTop:4 }}>{errors.name}</p>}
              </div>

              {/* 3. Details */}
              <div>
                <label style={{ display:"block", fontSize:11, color:"#888", marginBottom:6, letterSpacing:".06em", textTransform:"uppercase" }}>
                  Details <span style={{ fontSize:10, color:"#444", fontWeight:400, letterSpacing:0, textTransform:"none" }}>optional</span>
                </label>
                <input className="input-field" style={{padding:"9px 12px",fontSize:13}} placeholder="e.g. Bank, Cash, Office, Client…" value={form.source}
                  onChange={e=>setForm(f=>({...f,source:e.target.value}))}/>
              </div>

              {/* 4. Bill / Payment Date */}
              <div>
                <label style={{ display:"block", fontSize:11, color:"#888", marginBottom:6, letterSpacing:".06em", textTransform:"uppercase" }}>
                  Bill / Payment Date
                </label>
                <input
                  type="date"
                  className="input-field"
                  value={form.txDate || new Date().toISOString().slice(0,10)}
                  max={new Date().toISOString().slice(0,10)}
                  onChange={e=>setForm(f=>({...f,txDate:e.target.value}))}
                  style={{ colorScheme:"dark", cursor:"pointer", fontFamily:"'DM Mono',monospace", padding:"9px 12px", fontSize:13 }}
                />
                <p style={{ color:"#555", fontSize:10, marginTop:4 }}>Date of the bill or payment · defaults to today</p>
              </div>

              {/* 5. Type */}
              <div>
                <label style={{ display:"block", fontSize:11, color:"#888", marginBottom:7, letterSpacing:".06em", textTransform:"uppercase" }}>Type</label>
                <div style={{ display:"flex", gap:8 }}>
                  {TYPES.map(t => (
                    <button key={t} onClick={()=>setForm(f=>({...f,type:t}))}
                      className="type-btn"
                      style={{ flex:1, padding:"9px", borderRadius:8, border:"1px solid", cursor:"pointer", fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:500, transition:"all .2s",
                        background:form.type===t?(t==="Bill"?"#2d1a1a":"#1a2d1a"):"#1e1e26",
                        borderColor:form.type===t?(t==="Bill"?"#fb923c":"#34d399"):"#2e2e3a",
                        color:form.type===t?(t==="Bill"?"#fb923c":"#34d399"):"#888" }}>
                      {t==="Bill"?"📤 Bill":"📥 Payment"}
                    </button>
                  ))}
                </div>
              </div>

              {/* Amount + Currency — single row */}
              <div style={{ display:"flex", gap:10, alignItems:"flex-start" }}>
                <div style={{ flex:1 }}>
                  <label style={{ display:"block", fontSize:11, color:"#888", marginBottom:6, letterSpacing:".06em", textTransform:"uppercase" }}>Amount</label>
                  <input className={`input-field ${errors.amount?"error":""}`} type="number" min="0" step="0.01" placeholder="0.00" value={form.amount}
                    style={{padding:"9px 12px",fontSize:13}}
                    onChange={e=>{setForm(f=>({...f,amount:e.target.value}));setErrors(er=>({...er,amount:""}));}}/>
                  {errors.amount&&<p style={{ color:"#fb923c", fontSize:11, marginTop:4 }}>{errors.amount}</p>}
                </div>
                <div style={{ flexShrink:0 }}>
                  <label style={{ display:"block", fontSize:11, color:"#888", marginBottom:6, letterSpacing:".06em", textTransform:"uppercase" }}>Currency</label>
                  <div style={{ display:"flex", gap:6 }}>
                    {CURRENCIES.map(c => (
                      <button key={c.code} onClick={()=>setForm(f=>({...f,currency:c.code}))}
                        className="currency-btn"
                        style={{ padding:"6px 10px", borderRadius:7, border:"1px solid", cursor:"pointer",
                          fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:500, transition:"all .2s",
                          background: form.currency===c.code ? "#1e1e3a" : "#1e1e26",
                          borderColor: form.currency===c.code ? "#5b5bf6" : "#2e2e3a",
                          color: form.currency===c.code ? "#a5b4fc" : "#666" }}>
                        <div style={{fontSize:14, marginBottom:1}}>{c.symbol}</div>
                        <div style={{fontSize:9}}>{c.code}</div>
                      </button>

                  </div>

                  Documents <span style={{ fontSize:10, color:"#444", fontWeight:400, letterSpacing:0, textTransform:"none" }}>optional</span>
                </label>
                <DocUploader docs={form.docs} onChange={upd=>setForm(f=>({...f,docs:typeof upd==="function"?upd(f.docs):upd}))}/>

                <div style={{ background:"#1a1a22", border:"1px solid #2a2a32", borderRadius:8, padding:"8px 12px", fontSize:12, color:"#888" }}>

                  {" "} — {form.type==="Bill"?"📤 decreases":"📥 increases"} balance by{" "}
                  <strong style={{ color:"#e8e6e1" }}>{fmtC(Number(form.amount), form.currency)}</strong>
                  <span style={{ marginLeft:5, fontSize:10, color:"#5b5bf6", background:"#1e1e3a", border:"1px solid #3a3a5e", padding:"1px 5px", borderRadius:4 }}>{form.currency}</span>
                  {form.entryBy && <span style={{ marginLeft:6, fontSize:10, color:ebColor(form.entryBy) }}>· prep. by {form.entryBy}</span>}
                  {form.docs.length>0&&<span style={{ color:"#a5b4fc", marginLeft:6 }}>· 📎{form.docs.length}</span>}
                </div>
              )}

              <div style={{ display:"flex", gap:8 }}>
                <button className="btn-primary" style={{ flex:1, padding:"10px" }} onClick={handleSubmit}>{editId!==null?"Update Entry": form.type==="Bill" ? "Submit Bill for Approval →" : "Add Payment"}</button>

              </div>
              {form.type==="Bill"&&editId===null&&(
                <div style={{display:"flex",alignItems:"center",gap:7,background:"#1a1a0a",border:"1px solid #4a3a00",borderRadius:7,padding:"8px 12px",fontSize:11,color:"#f59e0b"}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                  Bill entries require admin approval before being added to the system.
                </div>
              )}
            </div>
          </div>
        )}

        {/* ── SHEET ── */}
        {view==="sheet" && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:20 }}>
              <div>
                <h1 style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:26, letterSpacing:"-.03em", marginBottom:4 }}>Account of Paragon</h1>
                <p style={{ color:"#555", fontSize:13 }}>{filteredEntries.length} of {entries.length} rows</p>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                {filterName!=="ALL"&&<button className="btn-pdf" onClick={()=>generatePDF(filterName,entries,people)}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
                  PDF — {filterName}
                </button>}
                <button className="btn-primary" style={{ fontSize:12, padding:"8px 18px" }} onClick={handleNew}>+ New Entry</button>
              </div>
            </div>

            {/* ── PENDING APPROVALS PANEL ── */}
            {pendingEntries.length > 0 && (
              <div style={{ marginBottom:28 }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
                  <div style={{ width:8, height:8, borderRadius:"50%", background:"#f59e0b", boxShadow:"0 0 8px #f59e0b" }}/>
                  <h2 style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:17, color:"#f59e0b", letterSpacing:"-.01em" }}>
                    Pending Approvals
                  </h2>
                  <span style={{ background:"#f59e0b", color:"#0f0f11", borderRadius:20, fontSize:11, fontWeight:900, padding:"2px 9px" }}>{pendingEntries.length}</span>
                  <span style={{ fontSize:11, color:"#666", marginLeft:4 }}>Bill entries awaiting admin review</span>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                  {pendingEntries.map((p, i) => {
                    const pIdx = people.indexOf(p.name);
                    const eIdx = entryByList.indexOf(p.entryBy);
                    const aColor = AVATAR_COLORS[pIdx>=0?pIdx%AVATAR_COLORS.length:0];
                    const eColor = EB_COLORS[eIdx>=0?eIdx%EB_COLORS.length:0];
                    return (
                      <div key={p._fireId||i} style={{ background:"#16160a", border:"1.5px solid #4a3a00", borderRadius:12, padding:"14px 18px", display:"flex", alignItems:"center", gap:16, flexWrap:"wrap" }}>
                        {/* Status dot */}
                        <div style={{ width:10, height:10, borderRadius:"50%", background:"#f59e0b", flexShrink:0, boxShadow:"0 0 6px #f59e0b55" }}/>
                        {/* TXN ID */}
                        <span style={{ fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:600, color:"#f59e0b", background:"#2a1f00", border:"1px solid #5a4000", padding:"3px 8px", borderRadius:5, flexShrink:0 }}>{p.txnId||"—"}</span>
                        {/* Date */}
                        <div style={{ fontSize:11, color:"#888", flexShrink:0 }}>
                          <div style={{ color:"#555", fontSize:9, textTransform:"uppercase", letterSpacing:".05em", marginBottom:1 }}>Submitted</div>
                          {p.submittedAt ? new Date(p.submittedAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"}) : "—"}
                        </div>
                        {/* Person */}
                        <div style={{ display:"flex", alignItems:"center", gap:7, flexShrink:0 }}>
                          <div style={{ width:26, height:26, borderRadius:"50%", background:aColor, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:800, color:"#fff" }}>{p.name?.[0]}</div>
                          <div>
                            <div style={{ fontSize:12, fontWeight:700, color:aColor }}>{p.name}</div>
                            <div style={{ fontSize:10, color:"#555" }}>Account</div>
                          </div>
                        </div>
                        {/* Type badge */}
                        <span style={{ fontSize:11, fontWeight:700, color:"#fb923c", background:"#2d1e0f", border:"1px solid #7c3a10", padding:"3px 9px", borderRadius:5, flexShrink:0 }}>BILL</span>
                        {/* Amount */}
                        <div style={{ flexShrink:0 }}>
                          <div style={{ fontSize:9, color:"#555", textTransform:"uppercase", letterSpacing:".05em", marginBottom:1 }}>Amount</div>
                          <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:15, color:"#fb923c" }}>{fmtC(p.amount, p.currency||"USD")}</span>
                          {p.currency&&p.currency!=="USD"&&<span style={{ marginLeft:5, fontSize:9, color:"#5b5bf6", background:"#1e1e3a", border:"1px solid #3a3a5e", padding:"1px 4px", borderRadius:3 }}>{p.currency}</span>}
                        </div>
                        {/* Source */}
                        {p.source && <div style={{ fontSize:12, color:"#666", flexShrink:0 }}>
                          <div style={{ fontSize:9, color:"#444", textTransform:"uppercase", letterSpacing:".05em", marginBottom:1 }}>Details</div>
                          {p.source}
                        </div>}
                        {/* Prepared by */}
                        <div style={{ flexShrink:0 }}>
                          <div style={{ fontSize:9, color:"#444", textTransform:"uppercase", letterSpacing:".05em", marginBottom:3 }}>Prepared by</div>
                          <span style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"3px 8px", borderRadius:20, fontSize:11, fontWeight:500, background:`${eColor}15`, border:`1px solid ${eColor}40`, color:eColor }}>
                            <span style={{ width:14, height:14, borderRadius:"50%", background:eColor, display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:8, color:"#0f0f11", fontWeight:900 }}>{p.entryBy?.[0]}</span>
                            {p.entryBy}
                          </span>
                        </div>
                        {/* Docs */}
                        {p.docs&&p.docs.length>0&&(
                          <span style={{ fontSize:10, background:"#1a1a2e", border:"1px solid #3a3a5e", color:"#a5b4fc", padding:"3px 8px", borderRadius:5, flexShrink:0 }}>📎 {p.docs.length}</span>
                        )}
                        {/* Action buttons — push right */}
                        <div style={{ marginLeft:"auto", display:"flex", gap:8, flexShrink:0 }}>
                          <button onClick={()=>handleReject(p)}
                            style={{ background:"#2d1a1a", border:"1.5px solid #7c2020", color:"#fb923c", fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:600, padding:"8px 16px", borderRadius:8, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            Reject
                          </button>
                          <button onClick={()=>handleApprove(p)}
                            style={{ background:"#0a2820", border:"1.5px solid #0f6a4a", color:"#34d399", fontFamily:"'DM Mono',monospace", fontSize:12, fontWeight:600, padding:"8px 18px", borderRadius:8, cursor:"pointer", display:"flex", alignItems:"center", gap:6 }}>
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20,6 9,17 4,12"/></svg>
                            Approve
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div style={{ height:1, background:"#2a2a32", margin:"22px 0" }}/>
              </div>
            )}
            {pendingEntries.length === 0 && (
              <div style={{ display:"flex", alignItems:"center", gap:8, background:"#0a1a14", border:"1px solid #0f3a28", borderRadius:8, padding:"10px 16px", marginBottom:20, fontSize:12, color:"#34d399" }}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#34d399" strokeWidth="2"><polyline points="20,6 9,17 4,12"/></svg>
                No pending approvals — all clear.
              </div>
            )}
            {/* Search bar */}
            <div style={{ position:"relative", marginBottom:14 }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#555" strokeWidth="2" style={{ position:"absolute", left:13, top:"50%", transform:"translateY(-50%)" }}>
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input
                value={sheetSearch}
                onChange={e=>setSheetSearch(e.target.value)}
                placeholder="Search by Submission ID (e.g. TXN-0001), name, details, prepared by…"
                style={{ width:"100%", background:"#16161b", border:"1px solid #2e2e3a", borderRadius:8, padding:"11px 14px 11px 38px", color:"#e8e6e1", fontSize:13, fontFamily:"'DM Mono',monospace", outline:"none", transition:"border .2s" }}
                onFocus={e=>e.target.style.borderColor="#5b5bf6"}
                onBlur={e=>e.target.style.borderColor="#2e2e3a"}
              />
              {sheetSearch && (
                <button onClick={()=>setSheetSearch("")} style={{ position:"absolute", right:12, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", color:"#555", cursor:"pointer", fontSize:16, lineHeight:1 }}>×</button>
              )}
            </div>
            <div style={{ display:"flex", gap:8, marginBottom:18, flexWrap:"wrap", alignItems:"center" }}>
              <button className={`filter-chip ${filterName==="ALL"?"active":""}`} onClick={()=>setFilterName("ALL")}>
                ☰ All
              </button>
              {people.map(p=>(
                <button key={p} className={`filter-chip ${filterName===p?"active":""}`} onClick={()=>setFilterName(p)}
                  style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{width:14,height:14,borderRadius:"50%",background:AVATAR_COLORS[people.indexOf(p)%AVATAR_COLORS.length],display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:8,fontWeight:800,color:"#fff",flexShrink:0}}>{p[0]}</span>
                  {p}
                </button>
              ))}
              {filterName !== "ALL" && (
                <button onClick={()=>setFilterName("ALL")}
                  style={{background:"#2d1a1a",border:"1px solid #5c2020",color:"#fb923c",fontFamily:"'DM Mono',monospace",fontSize:11,padding:"5px 12px",borderRadius:20,cursor:"pointer",display:"flex",alignItems:"center",gap:5}}>
                  ✕ Clear filter
                </button>
              )}
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:8, color:"#444", fontSize:11 }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
              Scroll horizontally to see all columns
            </div>
            <div className="card" style={{ padding:0, overflow:"hidden" }}>
              <div className="sheet-scroll" style={{ overflowX:"auto", WebkitOverflowScrolling:"touch" }}>
              <div style={{ minWidth:1490 }}>
              {/* Order: TXN ID · DATE · PREPARED BY · NAME · SOURCE · TYPE · AMOUNT · BALANCE · DOCS · ACTIONS */}
              <div style={{ display:"grid", gridTemplateColumns:"120px 135px 150px 135px 120px 110px 160px 170px 55px 130px", padding:"11px 18px", borderBottom:"1px solid #2a2a32", background:"#12121a", position:"sticky", top:0, zIndex:2 }}>
                {["SUBMISSION ID","DATE","PREPARED BY","NAME","DETAILS","TYPE","AMOUNT","BALANCE","DOCS","ACTIONS"].map((h,i)=>(
                  <span key={i} style={{ fontSize:10, color: i===0?"#a5b4fc":i===1?"#f59e0b":"#555", letterSpacing:".08em", fontWeight:500 }}>{h}</span>
                ))}
              </div>
              {(() => {
                const running = {}; // key: "name::currency"
                return filteredEntries.map((e, i) => {
                  const cur = e.currency || "USD";
                  const key = e.name + "::" + cur;
                  if (!running[key]) running[key] = 0;
                  running[key] += e.type==="Payment" ? e.amount : -e.amount;
                  const bal = running[key];
                  const idx = people.indexOf(e.name);
                  const eidx = entryByList.indexOf(e.entryBy);
                  const eColor = EB_COLORS[eidx>=0?eidx%EB_COLORS.length:0];
                  return (
                    <div key={e.id} className="sheet-row" style={{ display:"grid", gridTemplateColumns:"120px 135px 150px 135px 120px 110px 160px 170px 55px 130px", padding:"11px 18px", borderBottom:i<filteredEntries.length-1?"1px solid #1e1e26":"none", alignItems:"center" }}>
                      {/* 0. SUBMISSION ID */}
                      <div>
                        <span style={{ display:"inline-block", fontFamily:"'DM Mono',monospace", fontSize:11, fontWeight:600, color:"#a5b4fc", background:"#1a1a2e", border:"1px solid #3a3a5e", padding:"3px 7px", borderRadius:5, letterSpacing:".04em" }}>
                          {e.txnId || "—"}
                        </span>
                      </div>
                      {/* 1. DATE */}
                      <div>
                        {e.createdAt ? (
                          <div>
                            <div style={{ fontSize:11, color:"#e8e6e1", fontWeight:500 }}>{new Date(e.createdAt).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}</div>
                          </div>
                        ) : <span style={{color:"#333",fontSize:11}}>—</span>}
                      </div>
                      {/* 2. PREPARED BY */}
                      <div>
                        {e.entryBy ? (
                          <span style={{ display:"inline-flex", alignItems:"center", gap:5, padding:"3px 8px", borderRadius:20, fontSize:11, fontWeight:500, background:`${eColor}15`, border:`1px solid ${eColor}40`, color:eColor }}>
                            <span style={{ width:14, height:14, borderRadius:"50%", background:eColor, display:"inline-flex", alignItems:"center", justifyContent:"center", fontSize:8, color:"#0f0f11", fontWeight:900 }}>{e.entryBy[0]}</span>
                            {e.entryBy}
                          </span>
                        ) : <span style={{color:"#333",fontSize:11}}>—</span>}
                      </div>
                      {/* 2. NAME */}
                      <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                        <div style={{ width:22, height:22, borderRadius:"50%", background:AVATAR_COLORS[idx%AVATAR_COLORS.length], display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, fontWeight:800, color:"#fff", flexShrink:0 }}>{e.name[0]}</div>
                        <span style={{ fontSize:12, fontWeight:600, color:AVATAR_COLORS[idx%AVATAR_COLORS.length] }}>{e.name}</span>
                      </div>
                      {/* 3. SOURCE */}
                      <span style={{ fontSize:12, color:"#888", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{e.source||<span style={{color:"#333"}}>—</span>}</span>
                      {/* 4. TYPE */}
                      <span className={`tag tag-${e.type.toLowerCase()}`}>{e.type}</span>
                      {/* 5. AMOUNT */}
                      <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                        <span style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13, whiteSpace:"nowrap" }}>{fmtC(e.amount, e.currency)}</span>
                        {e.currency && e.currency !== "USD" && <span style={{ fontSize:9, color:"#5b5bf6", background:"#1e1e3a", border:"1px solid #3a3a5e", padding:"1px 5px", borderRadius:3, alignSelf:"flex-start" }}>{e.currency}</span>}
                      </div>
                      {/* 6. BALANCE */}
                      <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                        <span className={bal>=0?"balance-pos":"balance-neg"} style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:13, whiteSpace:"nowrap" }}>{fmtC(bal, cur)}</span>
                        {cur !== "USD" && <span style={{ fontSize:9, color:"#5b5bf6", background:"#1e1e3a", border:"1px solid #3a3a5e", padding:"1px 5px", borderRadius:3, alignSelf:"flex-start" }}>{cur}</span>}
                      </div>
                      {/* 7. DOCS */}
                      <div>
                        {e.docs&&e.docs.length>0
                          ?<span className="doc-badge" onClick={()=>handleEdit(e)}>📎 {e.docs.length}</span>
                          :<span style={{fontSize:11,color:"#333"}}>—</span>}
                      </div>
                      {/* 8. ACTIONS */}
                      <div style={{ display:"flex", gap:6 }}>
                        <button className="btn-ghost" onClick={()=>handleEdit(e)}>Edit</button>
                        <button className="btn-danger" onClick={()=>handleDelete(e.id)}>Del</button>
                      </div>
                    </div>
                  );
                });
              })()}
              {filteredEntries.length===0&&<div style={{ textAlign:"center", padding:"40px", color:"#555", fontSize:13 }}>No entries. <span style={{ color:"#5b5bf6", cursor:"pointer" }} onClick={handleNew}>Add one →</span></div>}
              {filteredEntries.length>0&&(
                <div style={{ display:"grid", gridTemplateColumns:"120px 135px 150px 135px 120px 110px 160px 170px 55px 130px", padding:"12px 18px", borderTop:"1px solid #2a2a32", background:"#12121a" }}>
                  <span/><span/><span style={{ fontSize:11, color:"#888", fontWeight:500 }}>TOTAL</span><span/><span/><span/>
                  <div>
                    {Object.entries(
                      filteredEntries.reduce((acc, e) => {
                        const c = e.currency||"USD";
                        if (!acc[c]) acc[c] = 0;
                        acc[c] += e.type==="Payment" ? e.amount : -e.amount;
                        return acc;
                      }, {})
                    ).map(([code, bal]) => (
                      <div key={code} style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                        <span style={{fontSize:9,color:"#5b5bf6",background:"#1e1e3a",border:"1px solid #3a3a5e",padding:"1px 4px",borderRadius:3}}>{code}</span>
                        <span className={bal>=0?"balance-pos":"balance-neg"} style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:12}}>{fmtC(bal,code)}</span>
                      </div>
                    ))}
                  </div>
                  <span/>
                  <span/><span/>
                </div>
              )}
              </div>{/* end minWidth */}
              </div>{/* end scroll wrapper */}
            </div>
          </div>
        )}
      </div>

      {/* ── PDF MODAL ── */}
      {showPdfModal&&(
        <div className="modal-overlay" onClick={()=>setShowPdfModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
              <div style={{ width:32, height:32, background:"#1a1a2e", border:"1px solid #3a3a5e", borderRadius:8, display:"flex", alignItems:"center", justifyContent:"center" }}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#a5b4fc" strokeWidth="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>
              </div>
              <h2 style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:20 }}>Print PDF Report</h2>
            </div>
            <p style={{ color:"#555", fontSize:13, marginBottom:20 }}>Select a person to generate their full account statement.</p>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {people.map((p,i)=>{
                const s = perPersonStats.find(x=>x.name===p);
                const dc = entries.filter(e=>e.name===p).reduce((t,e)=>t+(e.docs?.length||0),0);
                return (
                  <div key={p} className="pdf-card" onClick={()=>{generatePDF(p,entries,people);setShowPdfModal(false);}}>
                    <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                      <div style={{ width:36, height:36, borderRadius:"50%", background:AVATAR_COLORS[i%AVATAR_COLORS.length], display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:14, color:"#fff" }}>{p[0]}</div>
                      <div>
                        <div style={{ fontFamily:"'Syne',sans-serif", fontWeight:700, fontSize:15 }}>Account of {p}</div>
                        <div style={{ fontSize:12, color:"#555", marginTop:2 }}>{entries.filter(e=>e.name===p).length} transactions{dc>0&&<span style={{color:"#a5b4fc",marginLeft:6}}>· 📎{dc}</span>}</div>
                      </div>
                    </div>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontSize:11, color:"#555", marginBottom:2 }}>Balance</div>
                      <div className={s.balance>=0?"balance-pos":"balance-neg"} style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:15 }}>{fmt(s.balance)}</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <button className="btn-ghost" style={{ width:"100%", marginTop:18, padding:"10px" }} onClick={()=>setShowPdfModal(false)}>Cancel</button>
          </div>
        </div>
      )}

      {/* ── ADD PERSON MODAL ── */}
      {showAddPerson&&(
        <div className="modal-overlay" onClick={()=>setShowAddPerson(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h2 style={{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:20, marginBottom:6 }}>Add Person</h2>
            <p style={{ color:"#555", fontSize:13, marginBottom:20 }}>New name will appear in account list.</p>
            <input className={`input-field ${newPersonError?"error":""}`} placeholder="e.g. JOHN" value={newPersonName}
              onChange={e=>{setNewPersonName(e.target.value.toUpperCase());setNewPersonError("");}}
              onKeyDown={e=>{if(e.key==="Enter")handleAddPerson();}} autoFocus/>
            {newPersonError&&<p style={{ color:"#fb923c", fontSize:12, marginTop:6 }}>{newPersonError}</p>}
            <div style={{ marginTop:16 }}>
              <p style={{ fontSize:11, color:"#555", letterSpacing:".06em", textTransform:"uppercase", marginBottom:10 }}>Current</p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {people.map((p,i)=>(
                  <div key={p} style={{ display:"flex", alignItems:"center", gap:6, background:"#1e1e26", border:"1px solid #2e2e3a", borderRadius:20, padding:"4px 10px" }}>
                    <div style={{ width:16, height:16, borderRadius:"50%", background:AVATAR_COLORS[i%AVATAR_COLORS.length], display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:"#fff", fontWeight:800 }}>{p[0]}</div>
                    <span style={{ fontSize:12, color:"#bbb" }}>{p}</span>
                    {!DEFAULT_PEOPLE.includes(p)&&<span onClick={()=>setPeople(prev=>prev.filter(x=>x!==p))} style={{ fontSize:14, color:"#555", cursor:"pointer", lineHeight:1 }}>×</span>}
                  </div>
                ))}
              </div>
            </div>
            <div style={{ display:"flex", gap:10, marginTop:22 }}>
              <button className="btn-primary" style={{ flex:1 }} onClick={handleAddPerson}>Add</button>
              <button className="btn-ghost" onClick={()=>{setShowAddPerson(false);setNewPersonName("");setNewPersonError("");}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {submitted&&<div className="toast">✓ Entry saved successfully</div>}
      {submittedPending&&<div className="toast" style={{background:"#1a1200",border:"1px solid #5a4000",color:"#f59e0b"}}>⏳ Bill submitted — awaiting admin approval</div>}
    </div>
  );
}


    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(e) { return { error: e }; }
      render() {
        if (this.state.error) return (
          <div style={{fontFamily:"monospace",padding:40,color:"#fb923c",background:"#0f0f11",minHeight:"100vh"}}>
            <h2 style={{marginBottom:16}}>⚠️ App Error</h2>
            <pre style={{fontSize:13,whiteSpace:"pre-wrap"}}>{this.state.error.toString()}</pre>
          </div>
        );
        return this.props.children;
      }
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
