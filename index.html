    const { useState, useMemo, useRef, useEffect } = React;

  { id: 2, txnId: "TXN-0002", name: "GARRY",  type: "Payment", amount: 3500, source: "Bank",    entryBy: "ZIDAN", createdAt: "2025-01-12T11:30:00", docs: [] },
